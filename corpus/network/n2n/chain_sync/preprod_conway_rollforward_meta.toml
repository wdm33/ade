# N2N surfaces use different era-index schemes, so the chain-sync header
# wrap MUST map the era through the consensus index.
#
# The tag-24 inner is the bare era-specific header_cbor = the array(2)
# [header_body(array 10, Praos), kes_signature] — byte-identical to
# ade_ledger::block_validity::accepted_block_header_bytes over the same
# block.
