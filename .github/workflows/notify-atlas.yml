name: Notify Ade Atlas

# Fires repository_dispatch at wdm33/ade-atlas when the grounding docs / registry
# change, so the dashboard rebuilds instantly instead of waiting for its cron.
#
# Requires a fine-grained PAT with Contents:write on wdm33/ade-atlas, stored as
# secret ATLAS_DISPATCH_TOKEN. Until the secret exists this job is a clean
# no-op; ade-atlas's */10 cron is the fallback either way.

on:
  push:
    branches: [main]
    paths:
      - "docs/ade-CODEMAP.md"
      - "docs/ade-SEAMS.md"
      - "docs/ade-HEAD_DELTAS.md"
      - "docs/ade-TRACEABILITY.md"
      - "docs/ade-invariant-registry.toml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ade-atlas rebuild
        env:
          TOKEN: ${{ secrets.ATLAS_DISPATCH_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "ATLAS_DISPATCH_TOKEN not set — skipping. Add a fine-grained PAT"
            echo "with Contents:write on wdm33/ade-atlas to enable auto-refresh."
            exit 0
          fi
          curl -sf -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/wdm33/ade-atlas/dispatches \
            -d "{\"event_type\":\"ade-docs-updated\",\"client_payload\":{\"sha\":\"${GITHUB_SHA::7}\"}}"
          echo "Dispatched ade-docs-updated (sha ${GITHUB_SHA::7}) to wdm33/ade-atlas."
