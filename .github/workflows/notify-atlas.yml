name: Notify Ade Atlas

# Tells the ade-atlas dashboard to rebuild when the grounding docs / registry
# change, so the site reflects this repo without a manual trigger.
#
# Requires a fine-grained PAT with "Contents: write" on wdm33/ade-atlas, stored
# as the secret ATLAS_DISPATCH_TOKEN. Until that secret exists this job is a
# clean no-op (ade-atlas also has a daily cron fallback).

on:
  push:
    branches: [main]
    paths:
      - "docs/ade-CODEMAP.md"
      - "docs/ade-SEAMS.md"
      - "docs/ade-HEAD_DELTAS.md"
      - "docs/ade-TRACEABILITY.md"
      - "docs/ade-invariant-registry.toml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ade-atlas rebuild
        env:
          TOKEN: ${{ secrets.ATLAS_DISPATCH_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "ATLAS_DISPATCH_TOKEN not set — skipping. Add a fine-grained PAT"
            echo "with Contents:write on wdm33/ade-atlas to enable auto-refresh."
            exit 0
          fi
          curl -sf -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/wdm33/ade-atlas/dispatches \
            -d "{\"event_type\":\"ade-docs-updated\",\"client_payload\":{\"sha\":\"${GITHUB_SHA::7}\"}}"
          echo "Dispatched ade-docs-updated (sha ${GITHUB_SHA::7}) to wdm33/ade-atlas."
