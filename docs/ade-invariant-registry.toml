statement = "proposal_procedures MUST NOT remain an opaque byte field in the authoritative Conway tx-body shape. ConwayTxBody.proposal_procedures is Option<Vec<ProposalProcedure>>, decoded through a single closed entry point (decode_proposal_procedures) that rejects unknown gov_action tags, structural failures, empty sets, and trailing garbage deterministically; the typed form re-encodes byte-identically (PreservedCbor) for every well-formed Conway tx body. The decoder reuses the existing closed GovAction enum (preserving DC-LEDGER-10 UpdateCommittee discriminant) and the existing opaque Anchor struct."
