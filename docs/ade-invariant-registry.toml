# DC-STORE-04 describes the cardano-node three-DB architecture
# (ImmutableDB + VolatileDB + LedgerDB). Ade has deliberately diverged
# per CE-79 Tier 5 (intentional-divergence on non-hash-critical
# operator-facing surfaces): a single redb-backed store with logical
# separation via key prefixes (slots_by_hash, hashes_by_slot,
# snapshots_by_slot). The semantic guarantees of DC-STORE-04 —
# append-only finalized data and atomic snapshots — survive and are
# enforced by DC-STORE-02 and DC-STORE-03, both now enforced. The
# rule remains "declared" rather than "enforced" because Ade does
# not implement the literal three-DB topology DC-STORE-04 names.
# IDD discipline: rules are append-only; reclassification requires
# explicit user action (e.g., a new DC-STORE-04A strengthening that
# states the equivalent guarantee in Ade's terms).
