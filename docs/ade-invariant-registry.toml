[[rules]]
id = "CN-PROD-04"
tier = "derived"
statement = "Every CoordinatorEffect::BroadcastBlock reconstructs the AcceptedBlock from artifact.bytes through the BLUE self_accept authority against the pre-forge base, then admits it to the served ServedChainSnapshot via the single ServedChainHandle::push_atomic authority before the next slot tick. If the self_accept replay rejects, push_atomic is NOT called and the loop emits structured BroadcastPushError::SelfAcceptReplayRejected. ProducerLogEvent::BlockServed is emitted only for blocks present in the served snapshot. No silently-dropped (no-op) broadcast; only self-accepted forged blocks are served."
source = "docs/planning/phase4-n-t-invariants.md §1 (A4, A5); docs/clusters/PHASE4-N-T/cluster.md §1"
cross_ref = ["CN-SNAPSHOT-01", "DC-PROD-01"]
code_locus = "crates/ade_node/src/produce_mode.rs (BroadcastBlock arm -> push_atomic; BroadcastPushError); crates/ade_runtime/src/producer/served_chain_handle.rs (push_atomic, reused); crates/ade_ledger/src/producer/self_accept.rs (token reconstruction, reused)"
tests = ["broadcast_pushes_self_accepted_block_to_served", "broadcast_rejects_non_self_accepted_block", "forge_to_served_block_fetch_roundtrip"]
