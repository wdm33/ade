tests + ci_script populated at slice time. N-F-F is narrowly operator-key ingress
+ operator-material-backed ForgeActivation construction + the binary passing
Some(activation) when a complete key set is present, on top of the enforced N-F-E
forge tick. It REUSES the existing RED loaders (ade_runtime::producer::keys,
opcert_envelope, genesis_parser, ProducerShell::init) and mirrors produce_mode's
assembly, swapping the cold-start forge base for the warm-start recovered
BootstrapState. NO new BLUE authority / plugin seam / second forge codepath; NO
BLUE crate change expected. The forge stays subordinate + self-accept-only; the
N-F-E containment gate is unchanged. NO live / serve / gossip / peer-acceptance /
BA-02 / RO-LIVE-01 / durable-tip claim -- observable forge requires a
live/continuing feed (RO-LIVE-01 follow-on). At cluster close, OP-OPS-04 /
CN-PROD-02 / DC-NODE-05 get strengthened_in += "PHASE4-N-F-F". Carries CN-CINPUT-03
/ DC-CINPUT-02b (recovered-surface consume-side fence) and CN-NODE-01 (single
bootstrap authority) unchanged.
"""
source = "docs/planning/phase4-n-f-f-invariants.md"
cross_ref = ["CN-NODE-01", "CN-NODE-02", "CN-PROD-02", "OP-OPS-04", "DC-NODE-05", "DC-CINPUT-02b", "CN-CINPUT-03"]
