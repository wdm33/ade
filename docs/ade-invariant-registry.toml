[[rules]]
id = "DC-EVIDENCE-02"
tier = "derived"
statement = """
Adversarial false-accept rejection across 4 mandatory mutation
classes:
  1. Body byte flip preserving envelope shape
  2. Header body-hash mismatch
  3. KES / signature corruption
  4. VRF proof or output tamper

Each mutation produces either:
  (a) BlockAdmitted NOT emitted + AgreementVerdict::Diverged +
      exit code 30, OR
  (b) AdmissionHalted { reason: PeerSentUndecodableBytes } when
      corruption breaks decode before admit-attempt.

In NO case may a mutation produce BlockAdmitted (false accept),
Agreed, or InputNotFound. False-accept is release-blocking
(memory [[feedback-fail-closed-validation]]).
"""
