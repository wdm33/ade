[[rules]]
id = "DC-NODE-04"
tier = "derived"
statement = """
Authority-fatal halt + shutdown-resume identity: authoritative
errors (chain_write failure on a committed rollback,
SnapshotDecodeError::UnknownVersion or FingerprintMismatch during
bootstrap) halt the binary deterministically with a non-zero
exit code — no silent retry, no fallback decode. Clean shutdown
drains the admit/write/snapshot pipeline to a quiescent point
(bounded — no waiting indefinitely for peer sessions) and writes
a final snapshot via the persistent writer; restarting against
the same (chaindb, snapshot store) produces a byte-identical
initial (LedgerState, PraosChainDepState, ChainDb tip).

Schema-version migration (snapshot v1 -> v2 upgrade tooling) is
the snapshot-format lifecycle concern of DC-STORE-09, NOT a
shutdown-semantics concern of this rule. This rule does NOT carry
that open_obligation.
"""
source = "docs/planning/phase4-n-k-orchestrator-binary-invariants.md §1 (I-6, I-7)"
cross_ref = ["DC-CONS-20", "DC-CONS-21", "DC-STORE-09"]
code_locus = "crates/ade_node/src/node.rs, crates/ade_node/src/main.rs"
tests = [
    "crates/ade_node/tests/shutdown_resume_identity.rs::shutdown_then_resume_produces_byte_identical_state",
    "crates/ade_node/tests/shutdown_resume_identity.rs::shutdown_clean_exits_with_evidence",
    "crates/ade_node/tests/shutdown_resume_identity.rs::cold_start_without_genesis_fails_with_generic_startup_code",
    "crates/ade_node/tests/authority_fatal_decode.rs::binary_halts_on_authority_fatal_decode_error",
]
ci_script = "ci/ci_check_node_binary_uses_single_bootstrap.sh"
status = "enforced"
strengthened_in = ["PHASE4-N-K"]
evidence_notes = "PHASE4-N-K S7 (2026-05-26) shipped ade_node::node::run_node_until_shutdown with closed authority-fatal exit-code mapping (EXIT_AUTHORITY_FATAL_IO=10, EXIT_AUTHORITY_FATAL_DECODE=12, EXIT_GENERIC_STARTUP=1) and PersistentSnapshotWriter::force_capture in the shutdown drain. shutdown_then_resume_produces_byte_identical_state proves DC-NODE-04 end-to-end on a Conway 576 corpus block. binary_halts_on_authority_fatal_decode_error proves the no-silent-retry property. Schema-migration tooling is the open_obligation on DC-STORE-09, not on this rule."

# =============================================================================
# PHASE4-N-L — Wire protocol (mux session driver + handshake)
# =============================================================================
#
# Family choice: the `CN-NET-*` and `DC-NET-01` IDs were already
# in use (operator-topology rules from the classification table;
# DC-NET-01 = three-tier peer management). PHASE4-N-L's session
# layer therefore uses the `CN-SESS` and `DC-SESS` families to
# avoid ID collision while remaining append-only.
#
# Families introduced:
#   * CN-SESS — single-authority closures on the wire-session
#               surface (mux frame, handshake transition, session
#               reducer).
#   * DC-SESS — derived constraints on the wire-session surface
#               (handshake-before-traffic, closed mini-protocol id
#               registry, per-mini-protocol ordering, backpressure,
#               clock injection on keep-alive).
#
# Slice closures flip status to `enforced` and populate
# code_locus/tests/ci_script.

