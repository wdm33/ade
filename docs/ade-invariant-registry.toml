# =============================================================================
# PHASE4-N-M-B — Admission orchestrator + AgreementVerdict + admission JSONL
# =============================================================================
#
# Sub-cluster B of the PHASE4-N-M family. Sits on top of N-M-A (seed +
# anchor + WAL) and N-L (wire), composes CN-CONS-08 admit into the
# admission mode of `ade_node`. Mostly wiring; no new BLUE authority.
#
# Doctrine: see memory [[feedback-evidence-reducers-are-green-not-authority]]
