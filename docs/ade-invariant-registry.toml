evidence_notes = "PHASE4-N-K S3 (2026-05-26) shipped PersistentSnapshotWriter that delegates every capture decision to should_snapshot_after_block (the SOLE cadence policy). The orchestrator core consults the same policy on Admitted (S2) and emits CaptureSnapshot effects only when the policy returns true. ci/ci_check_persistent_writer_no_parallel_cadence.sh greps for parallel cadence definitions across the workspace and for orchestrator-core inline modulo. Eviction is explicitly out of scope (no open_obligation carried)."

