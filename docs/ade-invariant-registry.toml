[[rules]]
id = "DC-VAL-02"
tier = "derived"
statement = "A block is Valid iff both the consensus header authority (validate_and_apply_header) and the ledger body authority (apply_block_with_verdicts) accept it. No path may produce a Valid verdict while skipping either authority."
source = "Cardano ledger spec; Ouroboros Praos spec"
cross_ref = ["DC-LEDGER-02", "CN-CONS-04", "DC-CONS-04"]
code_locus = "crates/ade_ledger/src/block_validity/ (closed verdict/error taxonomy substrate; PHASE4-B1-S3), crates/ade_ledger/src/block_validity/transition.rs, crates/ade_ledger/src/block_validity/header_input.rs (header ∧ body composition; PHASE4-B1-S4)"
tests = ["valid_block_evolves_both_states", "header_before_body_fail_fast"]
ci_script = ""
status = "declared"
strengthened_in = ["PHASE4-B1"]

[[rules]]
id = "DC-VAL-03"
tier = "derived"
statement = "The header is validated before the body; body validation never runs on a header-invalid block. The first failing authority determines the reason (fail-fast ordering)."
source = "Ouroboros Praos spec; IDD fail-fast doctrine"
cross_ref = ["DC-VAL-02"]
code_locus = "crates/ade_ledger/src/block_validity/transition.rs (header authority decided before body; body authority unreachable on header failure; PHASE4-B1-S4)"
tests = ["header_before_body_fail_fast"]
ci_script = ""
status = "declared"
strengthened_in = ["PHASE4-B1"]

[[rules]]
id = "DC-VAL-04"
tier = "derived"
statement = "Ade's Valid/Invalid verdict for a block equals the reference cardano-node verdict, including the reason class where the reference exposes it. Established over both a positive corpus (real valid blocks) and a mandatory adversarial corpus (blocks the reference rejects)."
source = "cardano-node reference behavior; Cardano ledger spec"
cross_ref = ["DC-LEDGER-02", "CN-LEDGER-02"]
code_locus = "crates/ade_ledger/src/block_validity/ (closed Valid/Invalid + reject-class comparison surface; PHASE4-B1-S3), crates/ade_testkit/src/validity/replay.rs (GREEN positive-corpus replay harness driving block_validity over all 14 Conway-576 blocks; PHASE4-B1-S6)"
