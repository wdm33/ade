attack_rationale = "A producer that builds leader VRF proofs with the wrong era's alpha forges blocks the network rejects (block-production silently fails). Worse, a both-alphas verification/construction fallback would be a dual-semantic VRF surface — two valid interpretations of the same transcript — a consensus-split vector. Exactly one era-correct Praos VRF authority is required."
