# =============================================================================
# DC-LEDGER-09 — Conway governance-certificate accumulation authority (PHASE4-B5)
# Introduced by the PHASE4-B5 invariant sketch (docs/planning/phase4-b5-invariants.md).
# Makes B4's owner-tagged ConwayGovState effects APPLIED rather than observed-and-
# dropped. Strengthens DC-LEDGER-08 (retires its "routed out-of-mutation-scope"
# disposition for governance certs). status = "declared" until B5 slices land.
# =============================================================================

[[rules]]
id = "DC-LEDGER-09"
tier = "derived"
statement = """
Conway governance-certificate accumulation is a closed, total, era-versioned transition into ConwayGovState: every governance-affecting Conway cert that B4 owner-tagged to ConwayGovState (vote-delegation tags 9/10/12/13 -> vote_delegations; committee tags 14/15 -> committee_hot_keys; DRep tags 16/17/18 -> drep_expiry) resolves to exactly one explicit ConwayGovState mutation or a structured reject -- never observed-and-dropped, never flattened, never with payload fields lost. B5 mutates only governance-owned fields; it does not touch B4-owned CertState and does not double-apply the delegation/pool half of composite certs (10/12/13). DRep expiry is computed only from an explicit gov-env (current epoch + drepActivity); a missing required env input is a structured fail-fast, never a defaulted expiry. A cert that cannot be applied propagates a structured LedgerError and halts the block transition; incomplete or best-effort accumulation is a forbidden fail-open. ConwayGovState becomes a deterministic function of (boundary-loaded base then replayed block-stream cert effects) rather than a frozen snapshot -- a deliberate, oracle-confirmable fingerprint migration (T-DET-01)."""
source = "Cardano ledger spec (Conway CDDL gov cert tags 9..18; CONWAY CERTS/GOVCERT/COMMITTEE transitions; CIP-1694); IDD fail-fast + closed-surface doctrine"
cross_ref = ["DC-LEDGER-08", "DC-VAL-06", "DC-TXV-06", "T-DET-01", "CN-LEDGER-07", "DC-LEDGER-10"]
code_locus = "crates/ade_ledger/src/gov_cert.rs (apply_conway_gov_cert: native gov dispatch over ConwayCert, total over 18 tags) — PHASE4-B5-S2; crates/ade_ledger/src/state.rs (GovCertEnv + LedgerState::gov_cert_env() fail-fast) + crates/ade_ledger/src/pparams.rs (ConwayOnlyDepositParams.drep_activity) + crates/ade_ledger/src/error.rs (ValidationEnvironmentError::MissingDRepActivityParam) — PHASE4-B5-S1; crates/ade_ledger/src/rules.rs (accumulate_tx_certs / process_block_certificates thread Option<ConwayGovState>, apply the gov half, carry gov_state forward through apply_block — replaces the B4 observe-and-drop) — PHASE4-B5-S3; crates/ade_ledger/src/fingerprint.rs (gov-state + drep_activity fingerprint surface)"
tests = ["gov_apply_total_over_18_tags", "composite_gov_half_applied_once_certstate_untouched_by_b5", "drep_expiry_uses_epoch_plus_activity", "env_free_gov_certs_need_no_env", "drep_register_missing_env_is_fail_fast", "drep_expiry_overflow_is_fail_closed", "gov_apply_is_deterministic", "gov_cert_env_present_ok", "gov_cert_env_missing_drep_activity_is_fail_fast", "gov_accumulation_applies_drep_registration_into_gov_state", "gov_apply_error_halts_accumulation", "positive_synthetic_gov_state_accumulates", "gov_state_accumulation_replays_byte_identical", "adversarial_drep_register_update_missing_env_rejected", "adversarial_drep_expiry_overflow_rejected", "adversarial_decode_layer_rejects_guard_gov_path", "adversarial_double_resign_is_deterministic"]
ci_script = "ci/ci_check_gov_cert_accumulation_closed.sh"
status = "enforced"
open_obligation = "Real epoch-576 governance-state (VState)-vs-cardano-node oracle is environment-blocked (epoch-576 UMap/ledger snapshot absent; see corpus/gov_state/README.md, corpus/cert_state/README.md, corpus/validity/conway_epoch576/README.md). Reclassified environment-blocked per tier doctrine — same constraint as DC-LEDGER-08/DC-TXV-06/DC-TXV-03. Mechanical closure shipped: native total gov dispatch + env fail-fast + checked DRep-expiry arithmetic (DRepActivityOverflow) + block-path accumulation (gov_state carried forward, observe-and-drop removed) + synthetic positive/replay/adversarial corpus. The GOVCERT committee-membership tx-validity gate is a declared separable follow-up (OQ-3), not part of this accumulation closure. KNOWN LIMITATION newly promoted to authority by B5 (OQ-5, pre-existing decoder behavior, NOT introduced here): ConwayGovState keys gov state on bare Hash28; the codec collapses the key/script credential discriminant (ade_codec decode_stake_credential drops the type tag), so a key-hash and script-hash credential sharing 28 bytes are indistinguishable in vote_delegations/committee_hot_keys/drep_expiry. cardano-node keys on the full discriminated Credential. 28-byte collision is not cheaply forgeable; carrying the discriminant into StakeCredential/DRep is a separate cross-cutting follow-up (touches the whole credential surface), tracked here per the per-cluster security review."
authority_surface = "BLUE Conway governance-state accumulation"
cluster = "CL-LEDGER-VERDICT"

# =============================================================================
# DC-LEDGER-10 — Credential key/script discriminant fidelity (OQ-5)
# Introduced by the OQ-5 invariant sketch
# (docs/planning/oq5-credential-discriminant-invariants.md). Origin: PHASE4-B5
# per-cluster security review (WARN/MEDIUM) + DC-LEDGER-09 open_obligation. A
# fidelity correction: StakeCredential erases the key/script discriminant the
# decoders already observe and discard. status = "declared" until the OQ5
# cluster's slices land enforcement. Default scope Shelley+ (Byron only if
# cluster-plan proves an affected surface).
# =============================================================================

[[rules]]
id = "DC-LEDGER-10"
tier = "derived"
statement = """
Credential identity is faithful end-to-end: a stake/committee/DRep credential is a closed sum over {KeyHash, ScriptHash} of a 28-byte hash, never a tag-erased Hash28. Both era certificate decoders preserve the key/script discriminant (an unknown tag is a deterministic reject); the credential type makes a discriminant-less credential unrepresentable on the BLUE authority path (no Hash28->credential coercion); CertState (registrations/delegations/rewards) and ConwayGovState (vote_delegations/committee_hot_keys/drep_expiry) key on the discriminated credential, so a key-hash and a script-hash credential sharing 28 bytes are distinct authoritative-state keys (matching cardano-node's Credential-keyed UMap/VState); and the canonical fingerprint serializes the discriminant so two states differing only in a credential's key/script tag fingerprint differently. The discriminated representation is a deliberate cert-state + gov-state fingerprint migration (T-DET-01). Default scope is Shelley+; Byron is included only if proven to have an affected credential surface."""
source = "Cardano ledger spec (Credential = key|script across UTXOW/DELEG/GOVCERT; CIP-1694); IDD illegal-states-unrepresentable + determinism doctrine"
cross_ref = ["T-DET-01", "T-ENC-03", "DC-LEDGER-08", "DC-LEDGER-09", "DC-LEDGER-11", "DC-TXV-05"]
code_locus = "crates/ade_types/src/shelley/cert.rs (StakeCredential enum {KeyHash,ScriptHash} + hash()) — OQ5-S1; crates/ade_codec/src/shelley/cert.rs + crates/ade_codec/src/conway/cert.rs (decode_stake_credential preserves the tag, rejects unknown) — OQ5-S1; crates/ade_ledger/src/state.rs (ConwayGovState re-keyed to StakeCredential), gov_cert.rs, governance.rs, cert_classify.rs, rules.rs (cred.hash() boundary adapter for the Hash28-keyed stake snapshot) — OQ5-S1; crates/ade_ledger/src/fingerprint.rs (write_stake_credential emits discriminant+hash; gov-map writers use it; stake-snapshot writer stays write_hash28) — OQ5-S1; crates/ade_testkit/src/harness/snapshot_loader.rs (GREEN: gov-map + DRep-reg parses preserve the tag) — OQ5-S1; crates/ade_ledger/src/governance.rs (committee ratification by full-credential equality, no .hash() on the committee path) + crates/ade_ledger/src/state.rs (ConwayGovState.committee StakeCredential-keyed) + crates/ade_types/src/conway/governance.rs (GovActionState.committee_votes StakeCredential) + crates/ade_ledger/src/fingerprint.rs (write_committee_vote_list) + crates/ade_testkit/src/harness/snapshot_loader.rs (parse_committee_state + parse_committee_vote_map tag-preserving) — COMMITTEE-CRED-FIDELITY-S1; crates/ade_types/src/conway/governance.rs (GovActionState.drep_votes StakeCredential) + crates/ade_ledger/src/governance.rs (lookup_stake exact-variant DRep resolution, no OR-fallback) + crates/ade_ledger/src/fingerprint.rs (write_credential_vote_list, renamed from write_committee_vote_list, serves committee+drep) + crates/ade_testkit/src/harness/snapshot_loader.rs (parse_credential_vote_map, renamed, serves committee+drep) — DREP-VOTE-FIDELITY-S1; crates/ade_ledger/src/governance.rs (EnactmentEffects.committee_changes StakeCredential-typed — dormant, prevents committee-enactment re-collapse) — ENACTMENT-COMMITTEE-FIDELITY-S1; crates/ade_types/src/conway/governance.rs (GovAction::UpdateCommittee structured {removed: BTreeSet<StakeCredential>, added: BTreeMap<StakeCredential,u64>, threshold}, replacing opaque raw bytes) + crates/ade_ledger/src/fingerprint.rs (write_gov_action emits the structured 5-field shape via write_stake_credential) + crates/ade_testkit/src/harness/snapshot_loader.rs (parse_cold_credential/_set/_epoch_map + parse_unit_interval, fail-closed on unknown tag) — ENACTMENT-COMMITTEE-WRITEBACK-S1; crates/ade_ledger/src/governance.rs (apply_committee_enactment pure transition: dissolve + discriminated remove/add + quorum) + crates/ade_ledger/src/rules.rs (epoch-boundary apply site calls it) — ENACTMENT-COMMITTEE-WRITEBACK-S2"
tests = ["shelley_credential_preserves_discriminant", "conway_credential_preserves_discriminant", "unknown_credential_tag_rejects", "discriminant_changes_fingerprint", "keyhash_scripthash_same_bytes_are_distinct_certstate", "keyhash_scripthash_same_bytes_are_distinct_govstate", "discriminant_changes_fingerprint_corpus", "credential_accumulation_replays_byte_identical", "committee_keyhash_scripthash_do_not_cross_resolve", "committee_keyhash_scripthash_same_bytes_distinct", "committee_discriminant_changes_fingerprint", "drep_keyhash_scripthash_do_not_cross_resolve", "drep_vote_discriminant_changes_fingerprint", "enactment_committee_changes_keyhash_scripthash_distinct", "update_committee_decodes_removed_added_threshold", "update_committee_keyhash_scripthash_members_distinct", "update_committee_decode_rejects_malformed", "update_committee_structured_fields_change_fingerprint", "enact_update_committee_keyhash_scripthash_distinct", "committee_oracle_mainnet_575_576_noop_agreement"]
ci_script = "ci/ci_check_credential_discriminant_closed.sh"
status = "enforced"
open_obligation = "Real-chain agreement of the discriminated COMMITTEE credential keys vs cardano-node is now CONFIRMED (committee_oracle_mainnet_575_576_noop_agreement): the mainnet Conway 575/576 ledger-state snapshots (in s3://ade-corpus-snapshots, gitignored locally) show the interim committee is exactly 7 ScriptHash members (expiry 580, quorum 2/3) and our loader parses every member as ScriptHash, never a defaulted KeyHash. Real-chain agreement of the NON-committee discriminated keys (vote_delegations / drep_expiry in the Credential-keyed UMap/VState) remains environment-blocked pending those extractions; reclassified per tier doctrine, same posture as DC-LEDGER-08/DC-LEDGER-09/DC-TXV-06. Declared non-goals (separate work, not this cluster): withdrawal / required-signer / address credential discriminant, the Hash28-keyed stake-distribution snapshot, and the Byron credential surface. FOLLOW-UPS surfaced by the per-cluster security review (bounded to non-goal surfaces, NOT regressions): (a) governance.rs committee resolution stays hash-level because the committee member/vote types (committee, committee_votes) were not in OQ5 scope while committee_hot_keys was — when those types are discriminated, replace the .hash() comparisons with full-credential equality and add a (KeyHash X / ScriptHash X) cross-resolution negative test; (b) the shelley/cert.rs unknown-cert zero-hash KeyHash placeholder (pre-existing, ignored by apply_cert) should be closed when the Shelley cert grammar is closed. COMMITTEE-CRED-FIDELITY (strengthened_in) closed the committee member/vote surface (a) above; remaining follow-ups from its security review: (c) RESOLVED by DREP-VOTE-FIDELITY (strengthened_in) — drep_votes is now StakeCredential and governance.rs lookup_stake resolves DRep stake by exact variant (no key/script OR-fallback); spo_votes stays Hash28 (pools are always key-hash, permanent non-goal); (d) RESOLVED by ENACTMENT-COMMITTEE-FIDELITY then WIRED by ENACTMENT-COMMITTEE-WRITEBACK (both strengthened_in) — EnactmentEffects.committee_changes is StakeCredential-typed AND committee enactment is now live: GovAction::UpdateCommittee is structured (removed set + added map of discriminated cold credentials, no opaque raw bytes), the snapshot-loader decode is fail-closed on an unknown credential tag, and apply_committee_enactment writes the committee back at the epoch boundary (NoConfidence dissolve + UpdateCommittee remove/add/quorum) without re-collapsing the map. Real-chain committee parse + no-op write-back agreement is oracle-confirmed at the mainnet 575->576 boundary (committee_oracle_mainnet_575_576_noop_agreement); the positive committee-CHANGE case is reality-blocked (mainnet enacted no committee change in this range), not environment-blocked; (e) GREEN loader mk_credential defaults tag!=1 to KeyHash (contained to ade_testkit, cannot reach the node binary) — could reject unknown tags instead; note the NEW UpdateCommittee cold-credential decode (parse_cold_credential) IS fail-closed on unknown tags, so (e) now applies only to the older mk_credential helper."
