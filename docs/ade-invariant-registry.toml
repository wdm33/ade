attack_rationale = "Cardano-specific: forging against synthetic zero-stake / empty-ledger state produces blocks that are never leader-eligible and never extend the real chain — a producer that silently forges off fake state would either never win a slot or fork off a non-canonical base. Binding the forge base to the single bootstrap authority makes a synthetic-state producer structurally impossible."
evidence_notes = "S5 CI gate ci_check_produce_mode_uses_bootstrap_initial_state.sh: positive grep (bootstrap_initial_state( call present in produce_mode) + negative grep (no SyntheticForgeInputs / build_synthetic_forge_context / inline LedgerState::new( forge-base). Cold-start branch only; warm-start is test-only until N-U."
