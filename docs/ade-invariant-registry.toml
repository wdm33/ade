authority_surface = "producer-side chain-sync server-agency reducer"
cluster = "PHASE4-N-G"
evidence = ["Reducer signature is total: every (state, in_msg) pair under client-agency returns Ok(ServerStep::Reply(_)) or Ok(ServerStep::Done) or Err(ProducerServerError::Grammar(_)). The match arm covering server-originated messages from client agency returns a Grammar error (defensive; the underlying BLUE state machine rejects these first).", "Server-agency states (CanAwait/MustReply) are exited via either ServerReply::roll_forward(_) (data available) or ServerReply::await_reply() (parks in MustReply for advance_tip). Intersect leg always returns IntersectFound or IntersectNotFound. Done leg always returns ServerStep::Done."]

