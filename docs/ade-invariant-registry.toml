PHASE4-N-M-FOLLOW (2026-05-27) strengthens by demonstrating sustained admission across the natural chain-sync stream. Committed transcript at `docs/evidence/phase4-n-m-follow-sustained-transcript.jsonl` records 34 consecutive `block_admitted` events from real chain-sync follow + block-fetch (slots 124137045..124137868), 0 `diverged`, 0 mismatched-hash, 0 `input_not_found`. The pump now walks the peer's chain in order from intersect: each `RollForward` extracts a Point from the header envelope and triggers a block-fetch; `block-fetch BatchDone` gates the next chain-sync RequestNext. The op-cert counter rule was fixed inline — equal counter is now no-op (same op-cert re-used across blocks within a KES period, normal pool operation per the Cardano protocol). Previous strict-`<=` semantics over-rejected legitimate repeated op-certs and was masked by the corpus's one-block-per-pool design.
