ci_script = ""
status = "declared"
strengthened_in = ["PHASE4-B1"]

[[rules]]
id = "DC-VAL-05"
tier = "derived"
statement = "A Valid block yields evolved (LedgerState', PraosChainDepState'); an Invalid block yields the unchanged input states plus a structured reason. No partial or in-place mutation occurs on the invalid path."
