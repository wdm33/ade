PHASE4-N-M-FRAG (2026-05-27) CLOSED at HEAD `4d3dc98` shipped the session-reducer reassembly + tag-24 unwrap + chain_dep epoch_nonce wiring. The live pass then surfaced `Header(VrfCert(VerificationFailed))` at the `pool_active_stake_missing` stage with `epoch=0` — pointing at the era-schedule's epoch-number plumbing, NOT VRF / nonce / pool data.

