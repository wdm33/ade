[[rules]]
id = "DC-EPOCH-03"
tier = "derived"
statement = """
Single-epoch forge containment on the --mode node spine: in this forge path, a forge
is valid only within the single recovered seed epoch. A candidate forge slot beyond
the recovered seed epoch FAILS CLOSED -- it cannot be forged, served, or signed as a
valid block. The seed-epoch nonce (eta0) is frozen at the recovered value; the forge
apply path does NOT drive the BLUE CandidateFreeze / EpochBoundary nonce transitions
(they exist in ade_core::consensus::nonce but nothing drives them on the forge path),
so signing past the boundary with a stale eta0 is a peer-reject class and is
forbidden, not silently attempted. Cross-epoch production (nonce roll + epoch
transition driven from an epoch-aware tick + follow/durability) is a SEPARATE
nonce-roll/epoch-transition cluster, NOT this one. The off-epoch slot fails closed
with a structured local outcome (a fail-closed boundary for this single-epoch forge
path, hardening DC-NODE-05's single-epoch cluster-scope containment for the live-serve
path).
"""
source = "docs/planning/phase4-n-f-g-invariants.md"
cross_ref = ["DC-NODE-05", "DC-NODE-06", "DC-EPOCH-02", "CN-FORGE-04", "DC-CONS-18", "RO-LIVE-01"]
code_locus = "crates/ade_node/src/node_sync.rs, crates/ade_node/src/node_lifecycle.rs, crates/ade_node/src/run_loop_planner.rs, crates/ade_core/src/consensus/nonce.rs"
tests = ["forge_epoch_admission_within_seed_epoch_admits", "forge_epoch_admission_off_epoch_fails_closed", "forge_epoch_admission_unlocatable_fails_closed", "node_forge_off_epoch_slot_fails_closed", "node_forge_no_epoch_boundary_promotion_on_forge_path", "forge_tick_off_epoch_slot_fails_closed_local"]
ci_script = "ci/ci_check_node_forge_single_epoch_fail_closed.sh"
introduced_in = "PHASE4-N-F-G-A"
strengthened_in = []
status = "enforced"
evidence_notes = """
PHASE4-N-F-G invariant sketch (/invariants gate). Declared at sketch. Single-epoch
scope (OQ3) resolved with the user: do NOT patch nonce rollover into this cluster.
The BLUE nonce authority's epoch-boundary transitions are present but undriven on the
forge path (verified C1 scoping pass section 4a); this rule makes the boundary a
fail-closed wall rather than a stale-eta0 sign. tier = derived (Cardano-specific in
its Praos nonce / KES-period / leader-VRF details).
"""

# DC-STORE-04 describes the cardano-node three-DB architecture
# (ImmutableDB + VolatileDB + LedgerDB). Ade has deliberately diverged
# per CE-79 Tier 5 (intentional-divergence on non-hash-critical
# operator-facing surfaces): a single redb-backed store with logical
# separation via key prefixes (slots_by_hash, hashes_by_slot,
# snapshots_by_slot). The semantic guarantees of DC-STORE-04 —
# append-only finalized data and atomic snapshots — survive and are
# enforced by DC-STORE-02 and DC-STORE-03, both now enforced. The
# rule remains "declared" rather than "enforced" because Ade does
# not implement the literal three-DB topology DC-STORE-04 names.
# IDD discipline: rules are append-only; reclassification requires
# explicit user action (e.g., a new DC-STORE-04A strengthening that
# states the equivalent guarantee in Ade's terms).
