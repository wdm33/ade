status = "enforced"
introduced_in = "PHASE4-N-T"
strengthened_in = ["PHASE4-N-F-G-B"]
cluster = "PHASE4-N-T"
attack_rationale = "Cardano-specific: serving a block that failed self-accept (or silently dropping a forged block) would either propagate an invalid block to peers or advertise a chain the producer cannot actually serve. Gating push_atomic behind the self_accept replay and fail-closing on rejection makes 'served but not self-accepted' unrepresentable."
