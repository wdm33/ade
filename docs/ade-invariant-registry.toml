# =============================================================================
# PHASE4-N-C Block Production Closure (declared 2026-05-25 from
# docs/planning/phase4-n-c-invariants.md). N-C is the producer half of the
# bounty Tier-1 requirement (validation + block-production both required);
# validation closed across N-A, N-B, N-D, N-E and B1/B2/B3/B4/B5.
#
# Key boundary: private-key custody and signing operations live in RED/GREEN,
# never BLUE. BLUE consumes signed artifacts (VrfProof, KesSignature, OpCert)
# via canonical ProducerTick and proves consistency. Replay captures signed
# artifacts; replay never invokes RED signing.
#
# status flips from "declared" -> "enforced" as slices land tests + ci_scripts.
# =============================================================================

[[rules]]
id = "DC-CRYPTO-03"
tier = "derived"
statement = "VRF signing transcript equivalence and verification symmetry. For canonical inputs (slot, epoch_nonce, vrf_signing_key, vrf_role) the RED signer produces a VrfProof byte-identical to cardano-node's reference output, and the emitted VrfProof verifies under ade_crypto::vrf::verify_praos_vrf with the matching verification key. Private-key execution is RED-shell confined; BLUE consumes the VrfProof as a captured signed artifact."
source = "docs/planning/phase4-n-c-invariants.md §1 (NC-VRF-1/2/3); IETF draft-irtf-cfrg-vrf-03 (Praos VRF)"
cross_ref = ["T-DET-01", "T-KEY-01", "DC-CRYPTO-04", "OP-OPS-04"]
code_locus = "crates/ade_runtime/src/producer/signing.rs (vrf_prove)"
tests = ["vrf_prove_matches_reference_vectors", "vrf_prove_then_verify_round_trip"]
ci_script = "ci/ci_check_private_key_custody.sh"
status = "enforced"
introduced_in = "PHASE4-N-C"
strengthened_in = []

[[rules]]
id = "DC-CRYPTO-04"
tier = "derived"
statement = "KES signing transcript equivalence and verification symmetry. For canonical inputs (kes_secret, period, msg) the RED signer produces a KesSignature byte-identical to Haskell cardano-base's Sum6KES reference and verifying under ade_crypto::kes::verify_kes. After PHASE4-N-P S5 the algorithm is BLUE-owned (ade_crypto::kes_sum::Sum6Kes); cross-impl agreement with the Haskell reference is mechanically validated against a cardano-cli ground-truth corpus (DC-CRYPTO-08). Private-key execution is RED-shell confined; BLUE consumes the KesSignature as a captured signed artifact."
source = "docs/planning/phase4-n-c-invariants.md §1 (NC-KES-1); docs/planning/phase4-n-p-invariants.md; Cardano Sum6KES specification (depth-6 sum composition over ed25519)"
cross_ref = ["T-DET-01", "T-KEY-01", "DC-CRYPTO-03", "DC-CRYPTO-05", "DC-CRYPTO-08", "DC-CRYPTO-09", "DC-CONS-11", "OP-OPS-04"]
code_locus = "crates/ade_runtime/src/producer/signing.rs (kes_sign via BLUE Sum6Kes); crates/ade_crypto/src/kes.rs (KesSignature, verify_kes_signature via BLUE Sum6Kes); crates/ade_crypto/src/kes_sum/ (the BLUE algorithm itself)"
tests = ["kes_sign_matches_reference_vectors", "kes_sign_then_verify_round_trip", "kes_signature_from_bytes_round_trips", "verify_kes_signature_agrees_with_existing_verify_kes", "cardano_cli_corpus_sign_then_upstream_verifies"]
ci_script = "ci/ci_check_private_key_custody.sh, ci/ci_check_kes_sum_compatibility.sh"
status = "enforced"
introduced_in = "PHASE4-N-C"
strengthened_in = ["PHASE4-N-P"]

[[rules]]
id = "DC-CRYPTO-05"
tier = "derived"
statement = "KES evolution discipline: evolve(k_i) -> k_{i+1} is one-way. The evolved key signs period i+1 and MUST NOT sign for period i. RED kes_sign is forbidden when the requested period > current_period + evolutions_remaining; kes_evolve is forbidden when to < from or to > from + evolutions_remaining. Forward secrecy is a RED-shell discipline; BLUE has no recovery path if RED violates it. After PHASE4-N-P S5 the underlying algorithm (`ade_crypto::kes_sum::Sum6Kes::update_kes`) is BLUE-owned; per-field zeroize on Drop of consumed sub-seeds is implemented via `ZeroizingSeed` (DC-CRYPTO-08)."
source = "docs/planning/phase4-n-c-invariants.md §1 (NC-KES-2); docs/planning/phase4-n-p-invariants.md §1 (I6); Cardano Sum6KES specification"
cross_ref = ["DC-CRYPTO-04", "DC-CRYPTO-08", "T-KEY-01", "OP-OPS-04"]
code_locus = "crates/ade_runtime/src/producer/signing.rs (kes_update, kes_sign); crates/ade_crypto/src/kes_sum/sum.rs (SumKes::update_kes + ZeroizingSeed Drop)"
tests = ["kes_update_chain_matches_reference", "kes_sign_rejects_period_past_evolutions_remaining", "kes_update_rejects_backwards_evolution", "zeroizing_seed_drop_overwrites_bytes"]
ci_script = "ci/ci_check_private_key_custody.sh, ci/ci_check_kes_sum_compatibility.sh"
status = "enforced"
introduced_in = "PHASE4-N-C"
strengthened_in = ["PHASE4-N-P"]

[[rules]]
id = "DC-CRYPTO-06"
tier = "derived"
statement = "Ade-native KES envelope is the sole accepted hot-signing-key envelope format. Closed grammar `ade.kes.seed.v1`: load-bearing fields {`format`, `role`, `crypto`, `seed_32`, `period_idx`, `format_version`} are validated with `#[serde(deny_unknown_fields)]`; optional metadata {`genesis_hash`, `network_magic`, `created_at_slot`, `created_by`} is ignored but does not break load. The loader returns closed `AdeKesEnvelopeError` variants for every unsupported shape (UnknownEnvelopeFormat, WrongKeyRole, UnsupportedCryptoTag, MissingSeed32, MalformedSeed32, MalformedPeriodIdx, PeriodIdxOutOfRange, UnsupportedFormatVersion, MalformedJson). No fallback parser. No heuristic guess. Private-key bytes never appear in any error/log surface."
source = "docs/clusters/PHASE4-N-O/S1.md §1; docs/active/op-ops-04-ade-native-kes-flow.md (operator spec verbatim)"
cross_ref = ["OP-OPS-04", "DC-CRYPTO-03", "DC-CRYPTO-04", "DC-CRYPTO-05", "T-KEY-01"]
code_locus = "crates/ade_runtime/src/producer/ade_kes_envelope.rs (parse, serialize, AdeKesEnvelopeError); crates/ade_runtime/src/producer/keys.rs (load_ade_kes_signing_key, write_ade_kes_envelope, KeyLoadError::AdeEnvelope)"
tests = ["parse_round_trips_serialize", "parse_round_trips_at_nonzero_period", "parse_rejects_unknown_format", "parse_rejects_wrong_role", "parse_rejects_unsupported_crypto", "parse_rejects_unsupported_format_version", "parse_rejects_missing_seed_32", "parse_rejects_malformed_seed_32_length", "parse_rejects_uppercase_seed_hex", "parse_rejects_period_idx_overflow", "parse_accepts_period_idx_boundary", "parse_rejects_unknown_load_bearing_field", "parse_accepts_optional_metadata_fields", "parse_rejects_malformed_json", "serialize_does_not_leak_extra_fields", "envelope_error_carries_no_seed_bytes"]
ci_script = "ci/ci_check_kes_envelope_closed.sh"
status = "enforced"
introduced_in = "PHASE4-N-O"
strengthened_in = []

[[rules]]
id = "DC-CRYPTO-07"
tier = "derived"
statement = "cardano-cli's `KesSigningKey_ed25519_kes_2^6` envelope (the upstream `Sum6KES` expanded-tree serialization, 608 bytes for a fresh key) is loadable via the Ade-owned BLUE deserializer (`ade_crypto::kes_sum::Sum6Kes::raw_deserialize_signing_key_kes`). After PHASE4-N-P S5, structurally-valid 608-byte payloads round-trip into a `KesSecret`; any other payload shape — wrong size (32, 612, anything ≠ 608), malformed sub-tree, inconsistent vk hash, leaf-all-zero, period > 63 tree shape — fail-closes via `KeyLoadError::UnsupportedExpandedKesKeyFormat` (size mismatch) or `KeyLoadError::KesParse(KesParseError::*)` (structural defect). No fallback parser; the deserializer IS the structural validator."
source = "docs/clusters/PHASE4-N-O/S1.md §1; docs/clusters/PHASE4-N-P/S5.md; docs/active/op-ops-04-ade-native-kes-flow.md"
cross_ref = ["OP-OPS-04", "DC-CRYPTO-06", "DC-CRYPTO-08", "DC-CRYPTO-09"]
code_locus = "crates/ade_runtime/src/producer/keys.rs (load_kes_signing_key_skey routes 608-byte payloads through ade_crypto::kes_sum::Sum6Kes::raw_deserialize_signing_key_kes; wrong-size payloads return UnsupportedExpandedKesKeyFormat)"
tests = ["cardano_cli_kes_envelope_rejects_32_byte_payload", "cardano_cli_kes_envelope_rejects_synthetic_608_byte_payload", "cardano_cli_kes_envelope_accepts_real_608_byte_payload", "cardano_cli_kes_envelope_rejects_612_byte_payload", "cardano_cli_kes_envelope_rejects_608_byte_leaf_zero_payload", "cardano_cli_corpus_skey_deserializes_and_vk_matches_ground_truth"]
ci_script = "ci/ci_check_kes_envelope_closed.sh, ci/ci_check_kes_sum_compatibility.sh"
status = "enforced"
introduced_in = "PHASE4-N-O"
strengthened_in = ["PHASE4-N-P"]

[[rules]]
id = "DC-CRYPTO-08"
tier = "derived"
statement = "Ade-owned Sum6KES algorithm is Haskell-equivalent. `ade_crypto::kes_sum::Sum6Kes` is byte-identical to Haskell `cardano-base`'s `Sum6KES Ed25519DSIGN`: `derive_verification_key`, `gen_key_kes_from_seed_bytes`, `update_kes` (chain across all 64 periods), and `sign_kes` produce the same bytes as the Haskell reference for every (seed, period, msg) triple. Cross-impl validation against the cardano-cli ground-truth corpus is mechanically enforced under `#[cfg(test)]` only (3 throwaway 608-byte SKEY + VKEY pairs captured from `cardano-cli 11.0.0.0`; deserializing the SKEY through our impl produces the captured VK byte-for-byte). Note: `cardano-crypto` Rust 1.0.8 uses different `expand_seed` prefix bytes (0x00/0x01 vs Haskell's 0x01/0x02) — Ade matches Haskell, NOT cardano-crypto Rust; this divergence is asserted explicitly in `sum6_kes_seed_expansion_diverges_from_cardano_crypto_rust_1_0_8`. After PHASE4-N-P S5, `KesSecret.inner` is the Ade-owned signing key; `cardano-crypto` is a `#[cfg(test)]` oracle only. No compatibility shim may construct an upstream `SumSigningKey` through unsafe layout assumptions, transmute, vendored pub(crate) access, or fork-only constructors (N9), enforced by `ci/ci_check_kes_sum_compatibility.sh` Guard 3."
source = "docs/clusters/PHASE4-N-P/cluster.md; docs/planning/phase4-n-p-invariants.md §1 (I1, I2, I4, I6); §2 (N1, N9); docs/clusters/PHASE4-N-P/S4.md (cardano-cli ground-truth + prefix-divergence discovery)"
cross_ref = ["OP-OPS-04", "T-DET-01", "DC-CRYPTO-03", "DC-CRYPTO-04", "DC-CRYPTO-05", "DC-CRYPTO-06", "DC-CRYPTO-07"]
code_locus = "crates/ade_crypto/src/kes_sum/{mod,single,sum,hash,errors,period}.rs; crates/ade_crypto/src/kes_sum/cardano_cli_corpus.rs (#[cfg(test)] ground-truth corpus); crates/ade_crypto/src/kes_sum/tests.rs (35 unit tests)"
tests = ["sum0_kes_signs_and_verifies_at_period_0", "sum0_kes_rejects_period_1", "sum0_kes_update_expires_after_period_0", "sum0_kes_verify_rejects_wrong_message", "sum1_kes_signs_at_period_0_and_period_1", "sum6_kes_total_periods_is_64", "sum6_kes_sizes_match_recurrence", "sum6_kes_chain_advances_through_all_64_periods", "sum6_kes_update_after_period_63_expires", "sum6_kes_sign_rejects_period_64", "sum6_kes_verify_rejects_wrong_period_signature", "sum6_kes_seed_expansion_diverges_from_cardano_crypto_rust_1_0_8", "sum6_kes_vk_diverges_from_cardano_crypto_rust_for_same_seed", "cardano_cli_corpus_skey_deserializes_and_vk_matches_ground_truth", "cardano_cli_corpus_sign_then_upstream_verifies", "sum0_signing_key_debug_is_redacted", "sum_signing_key_debug_is_redacted", "zeroizing_seed_drop_overwrites_bytes"]
ci_script = "ci/ci_check_kes_sum_compatibility.sh, ci/ci_check_private_key_custody.sh"
status = "enforced"
introduced_in = "PHASE4-N-P"
strengthened_in = []

[[rules]]
id = "DC-CRYPTO-09"
tier = "derived"
statement = "Sum6KES expanded signing-key serde and period inference. `raw_serialize_signing_key_kes` / `raw_deserialize_signing_key_kes` are byte-identical to Haskell's `rawSerialiseSignKeyKES` / `rawDeserialiseSignKeyKES` for `Sum6KES Ed25519DSIGN`. The on-disk format is exactly 608 bytes; any other payload size fails closed via `KesParseError::WrongPayloadSize`. `current_period` is uniquely inferable from which sub-seeds are zeroed in the tree (no heuristic; exactly one valid period or a closed parse error) — implemented per the proof obligation at `docs/clusters/PHASE4-N-P/period-from-zeroed-sum6-tree-shape-proof.md`. Round-trip preserves period; serialize → deserialize → serialize yields byte-identical output for every period 0..=63. Malformed sub-trees (truncated child skey, wrong VK length at any recursion level, inconsistent vk0/vk1 hashes, leaf-all-zero) → closed `KesParseError` variant; no best-effort guesswork."
