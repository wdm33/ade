notes = "Path A scope split (decided 2026-05-25): the admit-side half (a successful receive admission updates ChainDb + LedgerState + PraosChainDepState atomically) is in scope for the receive-bridge cluster and will flip to enforced on close. The rollback-side half (a successful RollBackward rolls back all three) is OUT OF SCOPE for the receive-bridge cluster — ledger rollback infrastructure does not exist (no LedgerState encode/decode, no snapshot+replay-forward driver). A follow-on rollback cluster closes this half. Until then the receive bridge returns Err(ReceiveError::RollbackOutOfScope) on any peer RollBackward; receive state stays consistent. This rule's status stays at 'declared' through the receive cluster close; admit-side enforcement is recorded under CN-CONS-08 + DC-CONS-19 + DC-PROTO-09."

