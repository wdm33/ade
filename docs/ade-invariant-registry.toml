# =============================================================================
# OP-* Operational Invariants (Project Constitution §4b)
# =============================================================================

[[rules]]
id = "OP-NET-01"
tier = "operational"
statement = "Block producer connects only through trusted relay topology; no direct public peer connectivity"
source = "Project constitution §4b"
cross_ref = ["CN-NET-01"]
status = "declared"

[[rules]]
id = "OP-NET-02"
tier = "operational"
statement = "Relay paths geographically and topologically diverse; isolating one path does not prevent timely propagation"
source = "Project constitution §4b"
cross_ref = ["CN-NET-02"]
status = "declared"

[[rules]]
id = "OP-NET-03"
tier = "operational"
statement = "No single peer, ASN, region, or operator cluster dominates the node's authoritative view"
source = "Project constitution §4b"
cross_ref = ["CN-NET-03"]
status = "declared"

[[rules]]
id = "OP-MEM-01"
tier = "operational"
statement = "Mempool pressure and peer churn must not starve block validation, chain selection, or persistence (scheduling priority)"
source = "Project constitution §4b"
cross_ref = ["CN-MEM-02"]
status = "declared"

[[rules]]
id = "OP-OPS-01"
tier = "operational"
statement = "Post-incident reconciliation derived solely from recovered canonical chain"
source = "Project constitution §4b"
cross_ref = ["CN-OPS-01"]
status = "declared"

[[rules]]
id = "OP-OPS-02"
tier = "operational"
statement = "Emergency recovery procedures have explicit admissibility criteria, deterministic inputs/outputs, and authority thresholds"
source = "Project constitution §4b"
cross_ref = ["CN-OPS-02"]
status = "declared"

[[rules]]
id = "OP-OPS-03"
tier = "operational"
statement = "Incident evidence sufficient to reconstruct canonical decision path without relying on nondeterministic logs"
source = "Project constitution §4b"
cross_ref = ["CN-OPS-03"]
status = "declared"

