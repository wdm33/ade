id = "DC-VAL-04"
tier = "derived"
statement = "Ade's Valid/Invalid verdict for a block equals the reference cardano-node verdict, including the reason class where the reference exposes it. Established over both a positive corpus (real valid blocks) and a mandatory adversarial corpus (blocks the reference rejects)."
source = "cardano-node reference behavior; Cardano ledger spec"
cross_ref = ["DC-LEDGER-02", "CN-LEDGER-02", "DC-TXV-03"]
