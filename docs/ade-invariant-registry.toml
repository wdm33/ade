# =============================================================================
# PHASE4-N-C Block Production Closure (declared 2026-05-25 from
# docs/planning/phase4-n-c-invariants.md). N-C is the producer half of the
# bounty Tier-1 requirement (validation + block-production both required);
# validation closed across N-A, N-B, N-D, N-E and B1/B2/B3/B4/B5.
#
# Key boundary: private-key custody and signing operations live in RED/GREEN,
# never BLUE. BLUE consumes signed artifacts (VrfProof, KesSignature, OpCert)
# via canonical ProducerTick and proves consistency. Replay captures signed
# artifacts; replay never invokes RED signing.
#
# status flips from "declared" -> "enforced" as slices land tests + ci_scripts.
# =============================================================================

[[rules]]
id = "DC-CRYPTO-03"
tier = "derived"
statement = "VRF signing transcript equivalence and verification symmetry. For canonical inputs (slot, epoch_nonce, vrf_signing_key, vrf_role) the RED signer produces a VrfProof byte-identical to cardano-node's reference output, and the emitted VrfProof verifies under ade_crypto::vrf::verify_praos_vrf with the matching verification key. Private-key execution is RED-shell confined; BLUE consumes the VrfProof as a captured signed artifact."
source = "docs/planning/phase4-n-c-invariants.md §1 (NC-VRF-1/2/3); IETF draft-irtf-cfrg-vrf-03 (Praos VRF)"
cross_ref = ["T-DET-01", "T-KEY-01", "DC-CRYPTO-04", "OP-OPS-04"]
code_locus = "crates/ade_runtime/src/producer/signing.rs (vrf_prove)"
tests = ["vrf_prove_matches_reference_vectors", "vrf_prove_then_verify_round_trip"]
ci_script = "ci/ci_check_private_key_custody.sh"
status = "enforced"
introduced_in = "PHASE4-N-C"
strengthened_in = []

[[rules]]
id = "DC-CRYPTO-04"
tier = "derived"
statement = "KES signing transcript equivalence and verification symmetry. For canonical inputs (kes_secret, period, msg) the RED signer produces a KesSignature byte-identical to reference and verifying under ade_crypto::kes::verify_kes. Private-key execution is RED-shell confined; BLUE consumes the KesSignature as a captured signed artifact."
source = "docs/planning/phase4-n-c-invariants.md §1 (NC-KES-1); Cardano Sum6KES specification (depth-6 sum composition over ed25519)"
cross_ref = ["T-DET-01", "T-KEY-01", "DC-CRYPTO-03", "DC-CRYPTO-05", "DC-CONS-11", "OP-OPS-04"]
code_locus = "crates/ade_runtime/src/producer/signing.rs (kes_sign); crates/ade_crypto/src/kes.rs (KesSignature, verify_kes_signature)"
tests = ["kes_sign_matches_reference_vectors", "kes_sign_then_verify_round_trip", "kes_signature_from_bytes_round_trips", "verify_kes_signature_agrees_with_existing_verify_kes"]
ci_script = "ci/ci_check_private_key_custody.sh"
status = "enforced"
introduced_in = "PHASE4-N-C"
strengthened_in = []

[[rules]]
id = "DC-CRYPTO-05"
tier = "derived"
statement = "KES evolution discipline: evolve(k_i) -> k_{i+1} is one-way. The evolved key signs period i+1 and MUST NOT sign for period i. RED kes_sign is forbidden when the requested period > current_period + evolutions_remaining; kes_evolve is forbidden when to < from or to > from + evolutions_remaining. Forward secrecy is a RED-shell discipline; BLUE has no recovery path if RED violates it."
source = "docs/planning/phase4-n-c-invariants.md §1 (NC-KES-2); Cardano Sum6KES specification"
cross_ref = ["DC-CRYPTO-04", "T-KEY-01", "OP-OPS-04"]
code_locus = "crates/ade_runtime/src/producer/signing.rs (kes_update, kes_sign)"
tests = ["kes_update_chain_matches_reference", "kes_sign_rejects_period_past_evolutions_remaining", "kes_update_rejects_backwards_evolution"]
ci_script = "ci/ci_check_private_key_custody.sh"
status = "enforced"
introduced_in = "PHASE4-N-C"
strengthened_in = []

[[rules]]
id = "DC-CONS-11"
tier = "derived"
statement = "OpCert kes_period field equals the KES period at the forged slot under an operator-supplied anchor. period_at_slot(slot, anchor) = (slot - anchor) / slots_per_kes_period (integer floor). BLUE rejects header/opcert combinations with mismatched periods at forge time. BLUE MUST NOT infer the anchor from wall-clock or filesystem state; the anchor is a pure input on the canonical ProducerTick."
source = "docs/planning/phase4-n-c-invariants.md §1 (NC-KES-3/4); Praos / Shelley operational-certificate specification"
cross_ref = ["DC-CRYPTO-04", "DC-CONS-12"]
code_locus = "crates/ade_core/src/consensus/opcert_validate.rs (opcert_validate, OpCertError); crates/ade_codec/src/shelley/opcert.rs (encode_opcert, decode_opcert, OpCertCodecError)"
tests = ["opcert_validate_accepts_canonical_fixture", "opcert_validate_rejects_period_mismatch", "opcert_validate_rejects_short_hot_vkey", "opcert_validate_first_opcert_no_prev_counter", "opcert_encoder_matches_cardano_cli_byte_identical", "opcert_round_trip_byte_identical"]
ci_script = "ci/ci_check_opcert_closed.sh"
status = "enforced"
introduced_in = "PHASE4-N-C"
strengthened_in = []

[[rules]]
id = "DC-CONS-12"
tier = "derived"
statement = "OpCert serial counter is strictly monotonically increasing per (cold-key, node). BLUE rejects regression or repetition at the RED->BLUE boundary: opcert_validate fails when prev_counter is Some(c) and opcert.counter <= c. RED feeds the value from durable per-node state; BLUE never trusts an in-memory-only counter."
source = "docs/planning/phase4-n-c-invariants.md §1 (NC-OC-2); Cardano operational-certificate counter discipline"
cross_ref = ["DC-CONS-11", "OP-OPS-04"]
code_locus = "crates/ade_core/src/consensus/opcert_validate.rs (opcert_validate, OpCertError::{CounterRepeat, CounterRegression, BadColdSignature})"
tests = ["opcert_validate_rejects_counter_regression", "opcert_validate_rejects_counter_repeat", "opcert_validate_rejects_bad_signature_over_cold_key"]
ci_script = "ci/ci_check_opcert_closed.sh"
status = "enforced"
introduced_in = "PHASE4-N-C"
strengthened_in = []

[[rules]]
id = "DC-CONS-13"
tier = "derived"
statement = "Forge is pure given a canonical ProducerTick. forge_block has no wall-clock, no rand, no HashMap iteration, no I/O, no locale, and no ambient state. All inputs flow through the ProducerTick value (slot, ledger_state, mempool_snapshot, pparams, vrf_proof, kes_sig, opcert). Strengthens T-DET-01 for the producer authority surface."
source = "docs/planning/phase4-n-c-invariants.md §1 (NC-FORGE-1); Project constitution §2 (T-DET-01, Functional Core / Imperative Shell)"
