status = "enforced"
introduced_in = "PHASE4-N-C"
strengthened_in = []

[[rules]]
id = "DC-CONS-15"
tier = "derived"
statement = "Forge is invoked only when leader-check passes. forge_block is a forbidden transition for ticks where is_leader(state, vrf_output, sigma, asc) == false at tick.slot. The producer uses the same is_leader / check_leader_claim functions the validator uses; no producer-side fork of the leader-check formula is permitted."
source = "docs/planning/phase4-n-c-invariants.md §1 (NC-FORGE-3, NC-VRF-3); Praos / ouroboros-consensus leader-check"
cross_ref = ["CN-CONS-01", "DC-CONS-03", "DC-CONS-13"]
code_locus = "crates/ade_ledger/src/producer/forge.rs (leader-check gate); crates/ade_core/src/consensus/leader_schedule.rs (is_leader_for_vrf_output — shared with validator)"
tests = ["forge_block_rejects_non_leader_tick", "forge_block_uses_validator_leader_check_function"]
ci_script = "ci/ci_check_forge_purity.sh"
status = "enforced"
introduced_in = "PHASE4-N-C"
strengthened_in = []

[[rules]]
id = "DC-CONS-16"
tier = "derived"
statement = "Forged header.body_hash MUST equal blake2b_256(forged_body_wire_bytes), where forged_body_wire_bytes are produced by the single Cardano-compatible canonical block-body encoder used by the validator hash path. The producer and validator hash the same bytes through the same encoder. Strengthens T-ENC-01 for the producer surface; closes any potential producer/validator encoder bifurcation."
source = "docs/planning/phase4-n-c-invariants.md §1 (NC-FORGE-5); Project constitution §2 (T-ENC-01, Byte Authority Model)"
cross_ref = ["T-ENC-01", "DC-CONS-13", "CN-CONS-07"]
code_locus = "crates/ade_ledger/src/block_body_hash.rs (block_body_hash, block_body_hash_from_buckets — single canonical authority); crates/ade_ledger/src/producer/forge.rs (forge_block — consumer); crates/ade_ledger/src/block_validity/header_input.rs (computed_body_hash + accepted_block_header_bytes — consumer + N-G-strengthened single header-projection authority); crates/ade_runtime/src/producer/served_chain_lookups.rs (ServedHeaderLookup::next_after — third consumer; reuses accepted_block_header_bytes for producer-side server-pump header projection)"
tests = ["block_body_hash_pinned_recipe_byte_identical", "block_body_hash_from_block_equals_from_buckets", "block_body_hash_none_invalid_txs_equals_empty_bucket", "forged_body_hash_matches_validator_recomputation", "body_encoder_is_single_authority", "accepted_block_header_bytes_equals_validator_split_on_corpus", "accepted_block_header_bytes_is_subslice_of_as_bytes", "session_transcript_announced_header_matches_served_body_recipe"]
ci_script = "ci/ci_check_no_producer_body_encoder.sh, ci/ci_check_no_parallel_header_splitter.sh"
status = "enforced"
introduced_in = "PHASE4-N-C"
strengthened_in = ["PHASE4-N-G"]

[[rules]]
id = "DC-LEDGER-12"
tier = "derived"
statement = "Every tx in a forged block is admissible via ade_ledger::mempool::admit against the base ledger state, in the snapshot's canonical accumulating order. No tx in a forged block bypasses mempool validation. Forge MUST NOT permute, fabricate, or skip the snapshot's canonical accumulating order."
