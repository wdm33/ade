[[rules]]
id = "CN-FORGE-03"
tier = "derived"
statement = "Producer/validator codec symmetry: forge_block emits the era-tagged [era, block] envelope (era = Conway discriminant 7) via the single canonical ade_codec::encode_block_envelope (symmetric to decode_block_envelope), so forge_block output round-trips through the SAME decode_block authority that validates received blocks. decode_block(forge_block(tick).bytes) is Ok and yields a DecodedBlock whose header-body fields and four preserved body-bucket bytes equal what was forged. A bare-block (no-envelope) forge output, or any forge<->decode asymmetry, is CI-gated impossible. Root cause (PHASE4-N-T): forge_block emitted a bare array(5) block, so decode_block_envelope rejected EVERY forged block at offset 0 (BlockValidityError::Body(Decoding(InvalidStructure))) before any header/KES/leader/self_accept logic."
source = "docs/planning/phase4-n-v-invariants.md; docs/clusters/PHASE4-N-V/cluster.md §1"
