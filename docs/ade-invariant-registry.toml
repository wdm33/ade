operator-provided independent seed-point extraction inputs, not from the Mithril
manifest. The Mithril manifest may populate provenance and attestation fields
(SeedProvenance::Mithril), but the binding check (verify_mithril_binding) MUST
compare two structurally independent origins and fail closed on mismatch. In the
production composition the manifest import may be referenced only as whole values
(import.provenance -> seed_provenance; &import.report -> the verify call); the
import's point-bearing fields must never be drilled into or laundered (via a
local binding or a mutate-before-mint) into the anchor's seed_point.
"""
