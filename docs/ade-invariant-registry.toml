ci_script = "ci/ci_check_consensus_closed_enums.sh"
status = "enforced"
strengthened_in = ["PHASE4-B1"]

[[rules]]
id = "DC-VAL-03"
tier = "derived"
statement = "The header is validated before the body; body validation never runs on a header-invalid block. The first failing authority determines the reason (fail-fast ordering)."
source = "Ouroboros Praos spec; IDD fail-fast doctrine"
cross_ref = ["DC-VAL-02"]
code_locus = "crates/ade_ledger/src/block_validity/transition.rs (header authority decided before body; body authority unreachable on header failure; PHASE4-B1-S4)"
tests = ["header_before_body_fail_fast"]
ci_script = "ci/ci_check_consensus_closed_enums.sh"
status = "enforced"
strengthened_in = ["PHASE4-B1"]

