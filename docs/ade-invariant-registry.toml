[[rules]]
id = "CN-WIRE-09"
tier = "derived"
statement = """
The Shelley-and-later header_body `prev_hash` field is the closed wire grammar `$hash32 / null`
(cardano-ledger PrevHash = GenesisHash | BlockHash). Ade represents it as the closed sum
PrevHash = Genesis | Block(Hash32) -- never a flat Hash32. PrevHash::Genesis encodes to / decodes from
CBOR null (0xf6); PrevHash::Block(h) encodes to / decodes from a 32-byte hash32. A genesis-successor
block (block_number 0 on a from-genesis chain) MUST carry PrevHash::Genesis/null; a non-genesis block
(block_number > 0) MUST carry PrevHash::Block(hash32). Encoding is canonical and round-trips through
ONE shared BLUE ade_codec authority; the raw byte codec is POSITION-BLIND (it decodes null -> Genesis
and hash32 -> Block without knowing block_number). No all-zero Hash32, no anchor fingerprint, and no
Shelley genesis hash may stand in for the genesis predecessor. The position-aware check
(block_number 0 requires Genesis; block_number > 0 requires Block) is enforced by the sibling
forge/validation slice (CE-G-J-3, S3), NOT by this position-blind codec.
"""
source = "docs/planning/phase4-n-f-g-j-genesis-successor-prevhash-invariants.md"
cross_ref = ["CN-WIRE-08", "DC-FORGE-01", "CN-FORGE-01", "DC-NODE-08", "RO-LIVE-01"]
