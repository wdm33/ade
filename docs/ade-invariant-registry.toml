[[rules]]
id = "CN-FORGE-01"
tier = "derived"
statement = "The producer-mode forge handler is a closed transition from CoordinatorEvent::RequestForge { slot, kes_period, ledger_snapshot_ref, chain_tip } to exactly one of three ForgeResult variants: ForgeSucceeded { slot, artifact } where artifact.bytes decodes via Ade's BLUE block decoder AND self_accept(artifact, chain_tip, ledger_snapshot) returns Accepted; ForgeNotLeader { slot, vrf_output_fingerprint }; or ForgeFailed { slot, structured_error }. No other outcome is permitted. ForgeSucceeded MUST NOT be emitted if self_accept rejects the artifact — the handler emits ForgeFailed { SelfAcceptRejected } instead. Empty-block forging is the explicit scope; mempool integration is out of scope for the rule's enforcement evidence."
source = "docs/planning/phase4-n-r-invariants.md §1 (I1, I9); §2 (N1); §5 (state transitions)"
cross_ref = ["CN-CONS-07", "CN-PROD-02", "DC-CONS-18", "T-KEY-01"]
code_locus = "crates/ade_node/src/produce_mode.rs (run_real_forge BLUE-then-RED-then-BLUE pipeline; apply_effects_with_forge_handler call site); crates/ade_ledger/src/producer/forge.rs (forge_block BLUE step 5); crates/ade_ledger/src/producer/self_accept.rs (self_accept BLUE step 6 gate)"
tests = ["zero_stake_answer_emits_forge_not_leader", "kes_period_outside_window_emits_forge_failed_kes_period_mismatch", "full_stake_answer_reaches_self_accept_and_rejects", "run_real_forge_is_byte_identical_across_two_runs", "forge_block_accepts_empty_mempool", "forge_block_empty_mempool_produces_empty_body", "produce_mode_starts_runs_three_slots_and_exits_via_max_slots", "forge_to_self_accept_succeeds"]
ci_script = "ci/ci_check_producer_coordinator_no_secrets.sh, ci/ci_check_no_independent_forge_codepath.sh"
status = "enforced"
introduced_in = "PHASE4-N-R-A"
strengthened_in = ["PHASE4-N-S-A", "PHASE4-N-T", "PHASE4-N-W"]
cluster = "PHASE4-N-R-A"
attack_rationale = "Cardano-specific: forging a block that fails self-accept and broadcasting it would propagate an invalid block to peers, breaking the chain. Forging without a self-accept gate is a forged-by-error attack vector."
evidence_notes = "N-R-A's A4 integration tests cover 3 of the 4 ForgeResult branches (NotLeader, KesPeriodMismatch, SelfAcceptRejected). The 4th (ForgeSucceeded) is structurally guaranteed by the closed pipeline (the only path to Succeeded is past the self_accept = Accepted gate at step 6); asserting end-to-end ForgeSucceeded requires the KES-signs-real-unsigned-header bridge — a future-cluster deliverable explicitly out of N-R-A scope. The replay-byte-identity test (run_real_forge_is_byte_identical_across_two_runs) anchors DC-FORGE-01 against the full pipeline. PHASE4-N-W discharged the open obligation: with the KES-signs-real-unsigned-header bridge (N-S-A) and the producer Praos VRF migration (N-W) both landed, forge_to_self_accept_succeeds asserts end-to-end ForgeSucceeded — the producer forges a Conway block its own validator accepts via verify_praos_vrf."
open_obligation = ""

[[rules]]
id = "CN-FORGE-02"
tier = "derived"
statement = "Leader-check splits across the RED/BLUE color boundary: RED produces a VRF proof/output for the slot using the operator's VRF signing key; BLUE verifies the proof and evaluates leader eligibility from canonical inputs only (slot, eta0, stake_distribution, leader_threshold, vrf_vk, vrf_proof_or_output, LeaderScheduleAnswer). BLUE never sees the VRF / KES / cold signing keys. The BLUE evaluator (`verify_and_evaluate_leader`) lives at `ade_core::consensus::leader_check` and has no dependency on LedgerView, EraSchedule, ChainDepState, wall-clock, storage, or RED crates. Caller derives LeaderScheduleAnswer via the authority path (query_leader_schedule) and passes it in. The closed two-variant LeaderCheckVerdict (Eligible carries forge-capable material; NotEligible carries only bounded vrf_output_fingerprint evidence) makes illegal observation of forge-capable material structurally impossible."
source = "docs/planning/phase4-n-r-invariants.md §1 (I2); §2 (N12); §3 (D1); §4 (R3)"
cross_ref = ["T-KEY-01", "CN-FORGE-01", "DC-FORGE-01", "DC-CRYPTO-04", "DC-CRYPTO-05"]
code_locus = "crates/ade_core/src/consensus/leader_check.rs (verify_and_evaluate_leader + LeaderCheckVerdict + LeaderCheckError); crates/ade_node/src/produce_mode.rs (run_real_forge composition — RED vrf_prove → BLUE verify_and_evaluate_leader → RED kes_sign_at)"
tests = ["eligible_on_threshold_with_high_stake_emits_eligible_verdict", "not_eligible_with_zero_stake_emits_not_eligible_verdict", "malformed_proof_emits_verification_failed", "wrong_vk_emits_verification_failed", "answer_slot_mismatch_emits_structured_error", "vrf_input_mismatch_emits_structured_error", "zero_stake_denominator_emits_structured_error", "verdict_is_byte_identical_across_two_runs", "vrf_output_fingerprint_is_first_8_bytes_of_output", "zero_stake_answer_emits_forge_not_leader"]
ci_script = "ci/ci_check_leader_check_authority.sh"
status = "enforced"
introduced_in = "PHASE4-N-R-A"
strengthened_in = []
cluster = "PHASE4-N-R-A"
attack_rationale = "Cardano-specific: a BLUE component that owns or reads VRF signing keys could forge proofs for non-leader slots — the foundation of the eligibility security model. The RED/BLUE split makes BLUE structurally incapable of producing forge-capable material, even in the presence of bugs."
