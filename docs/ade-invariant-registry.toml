[[rules]]
id = "DC-STORE-08"
tier = "derived"
statement = """
Snapshot encoder canonicality: encode_snapshot(s) is byte-identical
across runs. Encoder uses BTreeMap iteration only; no HashMap, no
wall-clock, no floats, no rand. Definite-length CBOR containers.
"""
source = "docs/planning/persistent-snapshot-encoder-invariants.md §1 (I-2)"
cross_ref = ["T-DET-01", "T-ENC-01", "DC-CONS-21"]
code_locus = "crates/ade_ledger/src/snapshot/{chain_dep,utxo_state,cert_state,epoch_state,gov_state,ledger,framing}.rs"
tests = [
    "snapshot::chain_dep::tests::chain_dep_encode_deterministic_across_runs",
    "snapshot::utxo_state::tests::utxo_state_encode_deterministic_across_runs",
    "snapshot::cert_state::tests::cert_state_encode_deterministic_across_runs",
    "snapshot::epoch_state::tests::epoch_state_encode_deterministic_across_runs",
    "snapshot::gov_state::tests::pparams_encode_deterministic_across_runs",
    "snapshot::gov_state::tests::gov_state_encode_deterministic_across_runs",
    "snapshot::ledger::tests::ledger_state_encode_deterministic_across_runs",
    "snapshot::framing::tests::snapshot_encode_deterministic_across_runs",
    "snapshot::framing::tests::round_trip_via_fingerprint_combined",
]
ci_script = "ci/ci_check_snapshot_encoder_closure.sh"
status = "enforced"
strengthened_in = ["PHASE4-N-K"]
evidence_notes = "PHASE4-N-K (2026-05-26) strengthening: encoder canonicality now exercised by the persistent writer (PersistentSnapshotWriter::on_admitted / force_capture) and by the shutdown drain (ade_node::node::run_node_until_shutdown). Round-trip determinism asserted end-to-end in shutdown_then_resume_produces_byte_identical_state."

[[rules]]
id = "DC-STORE-09"
tier = "derived"
statement = """
Snapshot bytes carry a closed u32 version tag (initial == 1) and
the source state's blake2b-256 fingerprint. Decoder reads the
version tag first and rejects unknown versions before decoding the
ledger or chain-dep payload; decoder recomputes the fingerprint on
the decoded state and rejects on mismatch.
"""
source = "docs/planning/persistent-snapshot-encoder-invariants.md §1 (I-3, I-4)"
cross_ref = ["DC-CONS-21", "DC-STORE-08"]
code_locus = "crates/ade_ledger/src/snapshot/framing.rs"
tests = [
    "snapshot::framing::tests::snapshot_round_trip",
    "snapshot::framing::tests::decode_rejects_unknown_version",
    "snapshot::framing::tests::decode_rejects_fingerprint_mismatch",
]
ci_script = "ci/ci_check_snapshot_encoder_closure.sh"
status = "enforced"
strengthened_in = ["PHASE4-N-K"]
open_obligation = "snapshot_schema_migration_follow_on_cluster"
notes = "Schema-version migration tool is the snapshot-format lifecycle home for the v1->v2 (and onward) upgrade path. The current rule already pins the fail-closed posture on unknown versions; the open_obligation captures the missing operator-facing migration tooling. NOT a node-binary concern (PHASE4-N-K DC-NODE-04 deliberately does not carry this). PHASE4-N-K (2026-05-26) restated this scoping: ade_node's authority-fatal-decode exit path (DC-NODE-04) handles unknown-version + fingerprint-mismatch at bootstrap by halting deterministically (binary_halts_on_authority_fatal_decode_error). Schema-migration tooling remains the open obligation on this rule."

[[rules]]
id = "CN-STORE-08"
tier = "release"
statement = """
Single encoder authority: encode_ledger_state + decode_ledger_state
+ encode_chain_dep + decode_chain_dep + encode_snapshot +
decode_snapshot are the SOLE pub fn pairs in the project encoding
or decoding LedgerState / PraosChainDepState / (LedgerState,
PraosChainDepState) to/from bytes. No parallel canonical encoders.
Type-level + CI grep enforcement, mirroring CN-STORE-07.
"""
source = "docs/planning/persistent-snapshot-encoder-invariants.md §1 (I-5)"
cross_ref = ["CN-STORE-07", "DC-CONS-21", "DC-STORE-08"]
code_locus = "crates/ade_ledger/src/snapshot/{ledger,chain_dep,framing}.rs"
tests = []
ci_script = "ci/ci_check_snapshot_encoder_closure.sh"
status = "enforced"
strengthened_in = ["PHASE4-N-K"]
attack_rationale = "A parallel encoder may produce bytes that don't satisfy round-trip equivalence — a corruption attack vector if the wrong encoder is invoked."
evidence_notes = "Enforcement is type-level (single module hosts the encoder/decoder pair) + CI grep (no other pub fn returning Vec<u8> from &LedgerState or &PraosChainDepState across the workspace). PHASE4-N-K (2026-05-26) strengthening: encode/decode now driven end-to-end by the production orchestrator (bootstrap warm-start, PersistentSnapshotWriter, ade_node shutdown drain). All callers route through the single framing module — no node-binary-side reimplementation."

