# =============================================================================
# PHASE4-N-M-B — Admission orchestrator + AgreementVerdict + admission JSONL
# =============================================================================
#
# Sub-cluster B of the PHASE4-N-M family. Sits on top of N-M-A (seed +
# anchor + WAL) and N-L (wire), composes CN-CONS-08 admit into the
# admission mode of `ade_node`. Mostly wiring; no new BLUE authority.
#
# Doctrine: see memory [[feedback-evidence-reducers-are-green-not-authority]]
# — `AgreementVerdict` is GREEN evidence, NOT consensus / storage /
# ledger authority. Verdict reducer compares already-authoritative
# outputs; never decides authority.
#
# Families introduced (this sub-cluster):
#   * CN-ADMIT — single-authority closures on the admission surface.
#   * DC-ADMIT — derived constraints on verdict shape, vocabulary
#                isolation, per-admit WAL + replay-equivalence,
#                Lagging-not-success, no-refscript-skip.

