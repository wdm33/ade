evidence_notes = "S1 round-trip + corpus-pin tests (encode_decode_block_envelope_round_trips, conway_envelope_head_matches_corpus). S2 forge<->decode round-trip test (forge_block_output_decodes_via_decode_block) — fails on the pre-N-V tree, locking the regression — plus ci/ci_check_forge_decode_round_trip.sh. S3 forge_to_self_accept_succeeds (first in-process ForgeSucceeded). The bug was latent since N-C because no test ever round-tripped forge_block output through decode_block; self_accept tests used real enveloped corpus blocks. PHASE4-N-X: the serve-side tag-24 wire-wrap landed under CN-WIRE-08 — producer_block_fetch_serve now emits tag24(bytes([era,block])) (verified byte-identical to the real cardano-node 11.0.1 capture); the planning-doc's '[serialisationInfo, tag24(...)]' guess was wrong (bare tag-24, no serialisationInfo word)."
