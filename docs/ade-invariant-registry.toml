tier = "derived"
statement = "A block's validity verdict is a pure function of (LedgerState, PraosChainDepState, EraSchedule, LedgerView, block_cbor). No wall-clock, arrival order, HashMap/HashSet iteration, float, or ambient state may influence it."
source = "Cardano ledger spec; Ouroboros Praos spec; IDD determinism doctrine"
