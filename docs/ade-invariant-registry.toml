code_locus = "crates/ade_ledger/src/producer/forge.rs (forge_block); crates/ade_ledger/src/producer/state.rs (ProducerTick)"
tests = ["forge_block_pure_no_io", "forge_block_replay_byte_identical"]
ci_script = "ci/ci_check_forge_purity.sh"
status = "enforced"
introduced_in = "PHASE4-N-C"
strengthened_in = []

[[rules]]
id = "DC-CONS-14"
tier = "derived"
statement = "Forge byte-equality across replays. For two replays of an identical canonical ProducerTick stream over the same initial LedgerState, forge_block produces a byte-identical Vec<ForgedBlockBytes>. Replay uses captured signed artifacts (vrf_proof, kes_sig, opcert) and MUST NOT invoke RED signing; private-key material does not appear in replay corpora."
