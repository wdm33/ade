[[rules]]
id = "CN-CONS-07"
tier = "release"
statement = """
Self-acceptance bridge + serve provenance. A forged block is NOT eligible for RED broadcast unless
Ade's own header validator (PHASE4-N-B path) and body validator (PHASE4-B1 path) accept it under the
same slot, era, and context. Self-acceptance failure halts the producer deterministically. RED broadcast
is gated on the BLUE self-accept verdict. SERVE PROVENANCE (no unvalidated bytes leave the node): every
byte the node serves to a peer (ChainSync header advertisement / BlockFetch body) traces to the single
validated admit path -- for --mode node, a deterministic PROJECTION of the durable ChainDb (whose sole
production writers are pump_block / DC-NODE-12 and the validated warm-start / genesis replay
bootstrap_initial_state), covering BOTH forged (self_accept) and received (admit_via_block_validity)
durable bytes through the one durable admit; for --mode produce, the self_accept'd AcceptedBlock
served-chain index. PHASE4-N-U restates the serve clause from the in-memory-token dependency (N-G S2:
served bytes must originate as a live AcceptedBlock token, lost on restart) to durable-provenance --
PRESERVING the TRUE invariant (no unvalidated bytes leave) while letting serve follow the durable chain
(a follower fetches coherent history A->B, never B without A; serve survives restart). See DC-NODE-13.
"""
source = "docs/planning/phase4-n-c-invariants.md §1 (NC-SELF-1); docs/clusters/PHASE4-N-U/S3-serve-as-durable-chain-projection.md (serve-provenance restatement)"
cross_ref = ["CN-CONS-06", "DC-CONS-13", "DC-CONS-16", "OP-OPS-05", "DC-NODE-13", "DC-NODE-12"]
code_locus = "crates/ade_ledger/src/producer/self_accept.rs (self_accept, AcceptedBlock, SelfAcceptError); crates/ade_ledger/src/block_validity/transition.rs (block_validity — single closed validator authority self_accept wraps); crates/ade_ledger/src/producer/served_chain.rs (ServedChainSnapshot, served_chain_admit — only AcceptedBlock values may enter the produce-mode served-chain index; PHASE4-N-G S2 strengthening preserves the broadcast gate across the network seam); crates/ade_runtime/src/network/served_chain_projection.rs (ChainDbServedSource — PHASE4-N-U S3: the --mode node served view is a read-only projection of the durable ChainDb, whose sole production writers are pump_block + bootstrap_initial_state; serves stored.bytes verbatim, reuses the single block_header_bytes / DC-CONS-18 header authority); crates/ade_runtime/src/network/serve_dispatch.rs (ServedChainSource enum — the single serve-dispatch authority reads either source; DC-NODE-07); crates/ade_ledger/src/receive/admitted.rs (AdmittedBlock, admit_via_block_validity — PHASE4-N-H mirror: receive-side admission gate via the same block_validity authority; symmetric to AcceptedBlock); crates/ade_ledger/src/receive/chain_write.rs (ChainDbWrite trait takes AdmittedBlock by value)"
tests = ["self_accept_accepts_freshly_forged_block", "self_accept_rejects_corrupted_body_hash", "self_accept_rejects_invalid_kes_signature", "self_accept_rejects_unbalanced_tx_in_body", "broadcast_callable_only_with_accept_verdict", "served_chain_admit_admits_corpus_block", "served_chain_admit_idempotent_on_byte_identity", "served_chain_admit_independent_of_order", "served_chain_snapshot_iteration_is_btreemap_ordered", "served_chain_block_bytes_accessor_returns_accepted_block_slice", "served_chain_range_bytes_returns_inclusive_window", "served_chain_fingerprint_replay_byte_identical", "admit_via_block_validity_accepts_corpus_block", "admit_via_block_validity_rejects_corrupted_body", "receive_apply_block_delivered_with_matching_header_admits"]
ci_script = "ci/ci_check_self_accept_gate.sh, ci/ci_check_served_chain_closure.sh, ci/ci_check_admitted_block_closure.sh, ci/ci_check_receive_reducer_closure.sh"
status = "enforced"
introduced_in = "PHASE4-N-C"
strengthened_in = ["PHASE4-N-G", "PHASE4-N-H", "PHASE4-N-F-G-B", "PHASE4-N-U"]
attack_rationale = "Prevents Ade from broadcasting blocks its own validator would reject — eliminates producer/validator drift as a release failure mode. PHASE4-N-G strengthening: prevents the network seam from being an end-run around the gate; bytes that reach the wire must trace through AcceptedBlock -> ServedChainSnapshot. PHASE4-N-H strengthening: prevents the receive seam from being an end-run; bytes that reach ChainDb via the receive path must trace through AdmittedBlock (the mirror token) — same block_validity authority, two separate gate tokens (AcceptedBlock for broadcast, AdmittedBlock for admission). PHASE4-N-U strengthening (serve clause): closes the durable-serve seam — when --mode node serves its adopted chain (forged AND received) to followers, the bytes are a read-only projection of the durable ChainDb whose sole production writers are pump_block (DC-NODE-12) + the validated warm-start replay; serving cannot leak a byte that did not clear block_validity. The restatement is a strict generalization of the N-G token-proof (the durable ChainDb is precisely where the AcceptedBlock + AdmittedBlock gate outputs land, durable-before-tip), not a relaxation."
evidence_notes = "Cardano-specific only in that the validators it wraps are Ade's Cardano-block validators (PHASE4-N-B + PHASE4-B1). The bridge pattern is general: producer authority must agree with validator authority before bytes leave BLUE. N-G S2 extends the bridge into the producer-side server pump's read path. N-H S1/S2 establishes the receive-side mirror: AdmittedBlock private-constructor token consumed by ChainDbWrite. The producer + receive gates are deliberately separate types so cross-use is mechanically impossible (¬P-6)."

[[rules]]
id = "OP-OPS-04"
tier = "operational"
statement = "Operator-supplied keys. Ade supports both KES key flows: (a) Ade-native `ade_node --mode key_gen_kes --out-file PATH` emitting an `ade.kes.seed.v1` envelope loaded via `ade_runtime::producer::keys::load_ade_kes_signing_key`; (b) cardano-cli `node key-gen-KES` emitting a 608-byte `KesSigningKey_ed25519_kes_2^6` envelope loaded via `ade_runtime::producer::keys::load_kes_signing_key_skey`. After PHASE4-N-P S5 the cardano-cli path routes through the Ade-owned BLUE deserializer (`ade_crypto::kes_sum::Sum6Kes::raw_deserialize_signing_key_kes`); both flows produce a `KesSecret` whose inner is `ade_crypto::kes_sum::Sum6Kes::SigningKey` (BLUE-owned algorithm). VRF and cold (Ed25519) keys continue to be operator-supplied via cardano-cli text-envelope `.skey` files. Private-key material never crosses into BLUE — the entire RED custody surface lives under `crates/ade_runtime/src/producer/{keys,signing,ade_kes_envelope}.rs`. Wrong-size payloads fail-close via `KeyLoadError::UnsupportedExpandedKesKeyFormat`; structurally-invalid 608-byte payloads fail-close via `KeyLoadError::KesParse(KesParseError::*)`. Mechanical enforcement: ci/ci_check_private_key_custody.sh + ci/ci_check_kes_envelope_closed.sh + ci/ci_check_kes_sum_compatibility.sh."
