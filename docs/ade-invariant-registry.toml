code_locus = "crates/ade_ledger/src/block_validity/ (closed verdict taxonomy: Valid carries evolved-state stats, Invalid carries structured reason; PHASE4-B1-S3), crates/ade_ledger/src/block_validity/transition.rs (Valid returns evolved (ledger', chain_dep'); Invalid returns input clones; PHASE4-B1-S4)"
tests = ["invalid_block_leaves_state_unchanged", "valid_block_evolves_both_states"]
ci_script = ""
status = "declared"
strengthened_in = ["PHASE4-B1"]

[[rules]]
