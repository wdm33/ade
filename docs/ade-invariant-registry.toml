cross_ref = ["DC-MEM-03", "DC-MEM-04", "DC-CONS-13"]
code_locus = "crates/ade_ledger/src/producer/forge.rs (tx-admissibility prefix gate); crates/ade_ledger/src/mempool/admit.rs (admit — reused for prefix check)"
tests = ["forge_block_rejects_tx_not_in_mempool_accepted_prefix", "forge_block_rejects_tx_permuted_from_accumulating_order", "forge_block_empty_mempool_produces_empty_body", "admit_prefix_property_documented"]
ci_script = "ci/ci_check_forge_purity.sh"
status = "enforced"
introduced_in = "PHASE4-N-C"
strengthened_in = []

[[rules]]
id = "CN-CONS-06"
tier = "release"
statement = "Cross-impl acceptance: blocks forged by Ade are accepted by cardano-node when delivered via N2N block-fetch / chain-sync. Evidence is operator-action: a sustained-window live_block_production_session against a private cardano-node capturing CE-N-C-LIVE_<date>.log. Conditional on testnet stake / SPO registration; if unavailable at cluster close the live half is marked blocked_until_operator_stake_available, not deferred."
source = "docs/planning/phase4-n-c-invariants.md §1 (NC-LIVE-1); bounty acceptance test (validation + block-production both required)"
cross_ref = ["CN-CONS-07", "CN-WIRE-01", "OP-OPS-05"]
code_locus = "crates/ade_testkit/src/producer/cross_impl_adapter.rs (mechanical half — structural cross-impl agreement: decode round-trip + body-hash binding + decoder/encoder structural field agreement); crates/ade_core_interop/src/bin/live_block_production_session.rs (live half — operator-action evidence binary)"
tests = ["cross_impl_adapter_forged_block_decodes_through_ade_codec", "cross_impl_adapter_forged_block_structurally_agrees_with_decoder", "cross_impl_adapter_corpus_round_trips_byte_identical"]
ci_script = "ci/ci_check_producer_corpus_present.sh"
status = "enforced"
introduced_in = "PHASE4-N-C"
strengthened_in = []
open_obligation = "Live half blocked_until_operator_stake_available: the mechanical half (structural cross-impl agreement — decode round-trip + S4 body-hash binding + decoder/encoder field agreement) is fully enforced via the cross_impl_adapter tests + ci/ci_check_producer_corpus_present.sh, satisfying the bytes-shape claim against the synthetic S3 corpus. The crypto-level cross-impl claim (real KES/VRF signatures accepted by cardano-node over N2N) is by-design out of reach of any CI gate against this corpus: synthetic fixtures carry all-zero KES/VRF artifacts so the BLUE forge can be replayed without invoking RED signing primitives. The crypto-level claim therefore lives in CE-N-C-8's operator-action live evidence: testnet (preview/preprod) SPO stake must be provisioned and the live_block_production_session binary run against a private cardano-node to capture docs/clusters/PHASE4-N-C/CE-N-C-LIVE_<date>.log. Reopen criteria: when stake is registered, run the binary per docs/clusters/PHASE4-N-C/CE-N-C-8_PROCEDURE.md and append the captured log path to this entry's evidence_notes. Follows the OP-OPS-04 precedent (enforced + open_obligation for a follow-on artifact)."
attack_rationale = "Cardano-specific: cross-impl acceptance is the bounty's only proof that derived compatibility holds end-to-end."
evidence_notes = "Release / interop evidence, not a universal law. CE-N-B-6 / CE-N-E-6 establish the operator-action live-evidence pattern this rule reuses. S7's mechanical half makes the structural cross-impl claim (decoder ⊕ encoder ≈ identity on captured forged bytes; body-hash binding through S4's authority). The crypto-level claim is operator-action only; the structural-vs-crypto split is documented in docs/clusters/PHASE4-N-C/N-C-S7.md §Notes on the structural-vs-crypto cross-impl split."

[[rules]]
id = "CN-CONS-07"
tier = "release"
statement = "Self-acceptance bridge: a forged block is NOT eligible for RED broadcast unless Ade's own header validator (PHASE4-N-B path) and body validator (PHASE4-B1 path) accept it under the same slot, era, and context. Self-acceptance failure halts the producer deterministically. RED broadcast is gated on the BLUE self-accept verdict."
source = "docs/planning/phase4-n-c-invariants.md §1 (NC-SELF-1)"
cross_ref = ["CN-CONS-06", "DC-CONS-13", "DC-CONS-16", "OP-OPS-05"]
code_locus = "crates/ade_ledger/src/producer/self_accept.rs (self_accept, AcceptedBlock, SelfAcceptError); crates/ade_ledger/src/block_validity/transition.rs (block_validity — single closed validator authority self_accept wraps); crates/ade_ledger/src/producer/served_chain.rs (ServedChainSnapshot, served_chain_admit — only AcceptedBlock values may enter the served-chain index; PHASE4-N-G S2 strengthening preserves the broadcast gate across the network seam)"
tests = ["self_accept_accepts_freshly_forged_block", "self_accept_rejects_corrupted_body_hash", "self_accept_rejects_invalid_kes_signature", "self_accept_rejects_unbalanced_tx_in_body", "broadcast_callable_only_with_accept_verdict", "served_chain_admit_admits_corpus_block", "served_chain_admit_idempotent_on_byte_identity", "served_chain_admit_independent_of_order", "served_chain_snapshot_iteration_is_btreemap_ordered", "served_chain_block_bytes_accessor_returns_accepted_block_slice", "served_chain_range_bytes_returns_inclusive_window", "served_chain_fingerprint_replay_byte_identical"]
ci_script = "ci/ci_check_self_accept_gate.sh, ci/ci_check_served_chain_closure.sh"
status = "enforced"
introduced_in = "PHASE4-N-C"
strengthened_in = ["PHASE4-N-G"]
attack_rationale = "Prevents Ade from broadcasting blocks its own validator would reject — eliminates producer/validator drift as a release failure mode. PHASE4-N-G strengthening: prevents the network seam from being an end-run around the gate; bytes that reach the wire must trace through AcceptedBlock -> ServedChainSnapshot."
evidence_notes = "Cardano-specific only in that the validators it wraps are Ade's Cardano-block validators (PHASE4-N-B + PHASE4-B1). The bridge pattern is general: producer authority must agree with validator authority before bytes leave BLUE. N-G S2 extends the bridge into the producer-side server pump's read path."

[[rules]]
id = "OP-OPS-04"
tier = "operational"
statement = "Operator-supplied keys. Ade does NOT generate cold / KES / VRF keys. Operator provides cardano-cli-format key files (*.skey, opcert) loaded by ade_runtime::producer::keys; private-key material never crosses into BLUE. Key generation remains a cardano-cli operator workflow. Mechanical enforcement of the RED-only custody invariant is provided by ci/ci_check_private_key_custody.sh (closure proof for CE-N-C-1; cross-referenced by DC-CRYPTO-03/04/05)."
source = "docs/planning/phase4-n-c-invariants.md §7 (OQ1)"
cross_ref = ["DC-CRYPTO-03", "DC-CRYPTO-04", "DC-CRYPTO-05", "DC-CONS-12"]
code_locus = "crates/ade_runtime/src/producer/keys.rs (load_*_signing_key_skey, KeyLoadError); crates/ade_runtime/src/producer/signing.rs (RED-confined custody)"
tests = ["cardano_cli_skey_envelope_round_trips_through_keys_loader", "keys_loader_rejects_wrong_envelope_type", "keys_loader_rejects_malformed_cbor_hex", "key_load_error_io_carries_no_path_bytes"]
ci_script = "ci/ci_check_private_key_custody.sh"
status = "enforced"
open_obligation = "cardano-crypto 1.0.8 exposes gen_key_kes_from_seed_bytes but no raw_deserialize_signing_key_kes for Sum6Kes; the keys loader currently round-trips synthetic seed-encoded skeys but does not yet load real cardano-cli's 612-byte expanded-tree Sum6KES serialization. Resolution: either upstream a Sum6Kes deserializer, fork the parsing locally, or document the cardano-cli kes-skey conversion step in the operator workflow. CE-N-C-8 operator-action evidence must exercise whichever path closes."

[[rules]]
