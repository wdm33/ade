source = "docs/planning/phase4-n-t-invariants.md §1 (A1, A2, A6); docs/clusters/PHASE4-N-T/cluster.md §1"
cross_ref = ["CN-NODE-01", "CN-PROD-02", "CN-FORGE-02", "DC-NODE-03"]
code_locus = "crates/ade_node/src/produce_mode.rs (bootstrap cold-start wiring; SyntheticForgeInputs deleted); crates/ade_runtime/src/producer/chain_evolution.rs (derive_forge_context); crates/ade_node/src/cli.rs (ProduceCli --json-seed + --consensus-inputs)"
