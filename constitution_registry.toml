# --- A. Wire, Decoding, and Byte Authority ---

[[rules]]
id = "CN-WIRE-01"
tier = "true"
statement = "Hash-critical original bytes must be preserved and used on all hash/signature-critical paths"
source = "classification_table.md §A"
cross_ref = ["T-DET-01", "T-ENC-01"]
code_locus = ""
tests = []
ci_script = ""
status = "declared"
attack_rationale = "Prevents tx/block/header ID drift and signature mismatch caused by re-encoding or lossy normalization."
evidence_notes = "Universal consequence of T-ENC-01/T-DET-01. Any system using content-addressed hashing must preserve original bytes for hash-critical paths. Governs the Byte Authority Model."

[[rules]]
id = "CN-WIRE-02"
tier = "true"
statement = "Internal replay/state surfaces must use exactly one canonical project encoding"
source = "classification_table.md §A"
cross_ref = ["T-DET-01", "T-ENC-01"]
code_locus = ""
tests = []
ci_script = ""
status = "declared"
attack_rationale = "Prevents replay divergence from multiple internal byte authorities."
evidence_notes = "Direct restatement of T-ENC-01 + T-DET-01 applied to internal surfaces. Universal: any replay-first system needs single canonical internal encoding."

[[rules]]
id = "CN-WIRE-03"
tier = "derived"
statement = "Consensus-critical deserialization must be equivalent across all supported versions and active code paths"
source = "classification_table.md §A"
cross_ref = []
code_locus = ""
tests = []
ci_script = ""
status = "declared"
attack_rationale = "Directly addresses the November 2025 malformed delegation/deserialization fork."
evidence_notes = "Cardano-specific: addresses version-skew within the Cardano protocol's multi-version support model. Evidence: ouroboros-network version types show this is a protocol-version-specific concern."

[[rules]]
id = "CN-WIRE-04"
tier = "true"
statement = "Malformed consensus-relevant inputs must be rejected deterministically before any authoritative state transition"
source = "classification_table.md §A"
cross_ref = []
code_locus = ""
tests = []
ci_script = ""
status = "declared"
attack_rationale = "Prevents a single malformed transaction from producing split histories."
evidence_notes = "Universal safety property: no system should allow malformed inputs to mutate authoritative state. Direct consequence of T-ERR-02 + T-INGRESS-01."

[[rules]]
id = "CN-WIRE-05"
tier = "derived"
statement = "No legacy or compatibility parser may accept bytes that the canonical parser rejects"
source = "classification_table.md §A"
cross_ref = []
code_locus = ""
tests = []
ci_script = ""
status = "declared"
attack_rationale = "Covers permissive legacy paths that could create version-skew forks."
evidence_notes = "Cardano-specific: addresses the multiple-era, multiple-version parser landscape specific to Cardano's evolution."

[[rules]]
id = "CN-WIRE-06"
tier = "derived"
statement = "Every network/storage ingress path must pass through named era-aware decode chokepoints"
source = "classification_table.md §A"
cross_ref = []
code_locus = ""
tests = []
ci_script = ""
status = "declared"
attack_rationale = "Prevents privileged or inconsistent decode paths from bypassing consensus rules."
evidence_notes = "Cardano-specific refinement of T-INGRESS-01: the era-aware part is Cardano's multi-era requirement."

[[rules]]
id = "CN-WIRE-07"
