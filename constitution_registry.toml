# =============================================================================
# RO-* Release Obligations (Project Constitution §4a)
# =============================================================================

[[rules]]
id = "RO-TEST-01"
tier = "release"
statement = "Consensus-relevant inputs fuzzed differentially across all supported versions; any verdict mismatch is release-blocking"
source = "Project constitution §4a, T-DET-01, DC-LEDGER-07"
cross_ref = ["CN-TEST-01"]
status = "declared"

[[rules]]
id = "RO-TEST-02"
tier = "release"
statement = "Every fork/mismatch/parser disagreement that ever occurred becomes a permanent regression corpus entry"
source = "Project constitution §4a, T-CI-01"
cross_ref = ["CN-TEST-02"]
status = "declared"

[[rules]]
id = "RO-TEST-03"
tier = "release"
statement = "Failed, duplicate, and boundary-case inputs remain verdict-stable under resubmission and replay"
source = "Project constitution §4a, T-DET-01, T-REC-01"
cross_ref = ["CN-TEST-03"]
status = "declared"

[[rules]]
id = "RO-REL-01"
tier = "release"
statement = "Release not mainnet-eligible without mixed-version topology consensus equivalence on adversarial inputs"
source = "Project constitution §4a, DC-LEDGER-07, T-DET-01"
cross_ref = ["CN-REL-01"]
status = "declared"

[[rules]]
id = "RO-REL-02"
tier = "release"
statement = "Cross-implementation accept/reject agreement on authoritative corpora is release-blocking"
source = "Project constitution §4a, DC-LEDGER-03, T-DET-01"
cross_ref = ["CN-REL-03"]
status = "declared"

[[rules]]
id = "RO-REL-03"
tier = "release"
statement = "No single implementation bug should exceed the protocol's intended safety or liveness fault threshold at ecosystem level"
source = "Project constitution §4a"
cross_ref = ["CN-REL-02"]
status = "declared"

# =============================================================================
# OP-* Operational Invariants (Project Constitution §4b)
# =============================================================================

[[rules]]
id = "OP-NET-01"
tier = "operational"
statement = "Block producer connects only through trusted relay topology; no direct public peer connectivity"
source = "Project constitution §4b"
cross_ref = ["CN-NET-01"]
status = "declared"

[[rules]]
id = "OP-NET-02"
tier = "operational"
statement = "Relay paths geographically and topologically diverse; isolating one path does not prevent timely propagation"
source = "Project constitution §4b"
cross_ref = ["CN-NET-02"]
status = "declared"

[[rules]]
id = "OP-NET-03"
tier = "operational"
statement = "No single peer, ASN, region, or operator cluster dominates the node's authoritative view"
source = "Project constitution §4b"
cross_ref = ["CN-NET-03"]
status = "declared"

[[rules]]
id = "OP-MEM-01"
tier = "operational"
statement = "Mempool pressure and peer churn must not starve block validation, chain selection, or persistence (scheduling priority)"
source = "Project constitution §4b"
cross_ref = ["CN-MEM-02"]
status = "declared"

[[rules]]
id = "OP-OPS-01"
tier = "operational"
statement = "Post-incident reconciliation derived solely from recovered canonical chain"
source = "Project constitution §4b"
cross_ref = ["CN-OPS-01"]
status = "declared"

[[rules]]
id = "OP-OPS-02"
tier = "operational"
statement = "Emergency recovery procedures have explicit admissibility criteria, deterministic inputs/outputs, and authority thresholds"
source = "Project constitution §4b"
cross_ref = ["CN-OPS-02"]
status = "declared"

[[rules]]
id = "OP-OPS-03"
tier = "operational"
statement = "Incident evidence sufficient to reconstruct canonical decision path without relying on nondeterministic logs"
source = "Project constitution §4b"
cross_ref = ["CN-OPS-03"]
status = "declared"
